<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Un Universo Para Ti - AR Romántico</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030008; 
            font-family: 'Georgia', serif;
            touch-action: none; 
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(3,0,8,1) 100%);
            transition: opacity 1s ease;
        }
        #instruction-layer {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            z-index: 5;
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            transition: opacity 2s ease;
        }
        .text-glow {
            color: #fff;
            text-align: center;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff69b4, 0 0 30px #ff00ff;
            animation: pulseText 3s infinite alternate;
            padding: 20px;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; font-style: italic; color: #ffd700; text-shadow: 0 0 8px #ff8c00; }
        .instruction-text { font-size: 1.8rem; color: #aeeeee; text-shadow: 0 0 15px #00ffff; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; border: 1px solid #00ffff;}
        
        #start-btn {
            pointer-events: auto;
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            color: white;
            background: linear-gradient(45deg, #ff1493, #8a2be2);
            border: 2px solid #ffb6c1;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.9);
        }

        @keyframes pulseText {
            0% { opacity: 0.8; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        #ARButton {
            position: absolute !important;
            bottom: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 20 !important;
            background: rgba(255, 20, 147, 0.8) !important;
            border: 1px solid white !important;
            color: white !important;
            border-radius: 20px !important;
            padding: 12px 24px !important;
            font-family: inherit !important;
            font-weight: bold !important;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 class="text-glow">El Portal de Nuestro Amor</h1>
        <p class="text-glow">Un universo secreto aguarda por ti...</p>
        <button id="start-btn">Despertar la Magia</button>
    </div>

    <div id="instruction-layer">
        <h2 class="text-glow instruction-text">👇 Toca cualquier parte de la pantalla para avanzar y cruzar el portal 👇</h2>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        // --- VARIABLES GLOBALES ---
        let scene, camera, renderer;
        let portalGroup, pathGroup, universeGroup;
        let mainHeartGroup, particleSystem;
        let heartUniforms, portalUniforms, lotusUniforms;
        
        let clock = new THREE.Clock();
        let isStarted = false;
        let hasCrossedPortal = false;
        let isAutoWalking = false; 
        
        let userCenter = new THREE.Vector3(); 
        let floatingTexts = [];
        let fireflies = [];
        
        // --- VARIABLES SÚPER WOW Y SÚPER ROMÁNTICAS ---
        let petals = [];
        let shootingStars = [];
        let geometricFlower;
        let flashSphere, shockwaveRing;
        let isFlashing = false;
        let goldenRingsGroup;
        let nebulaDome;
        let lanterns = [];
        
        // LAS NUEVAS ADICIONES MAJESTUOSAS
        let wingL, wingR;
        let redThreadCurve, redThreadLine, threadPulse;
        let lotusMandalaFloor;

        const frases = [
            "Eres mi destino",
            "Mi alma te reconoce",
            "En cada latido, tú",
            "Mi refugio y mi paz",
            "Te amo en todos los universos",
            "Contigo, todo tiene sentido",
            "Por siempre y para siempre"
        ];

        // --- INICIALIZACIÓN ---
        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050010, 0.05);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            camera.position.set(0, 0, 3); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true; 
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffb6c1, 0.6);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xff1493, 2, 10);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);

            universeGroup = new THREE.Group();
            universeGroup.visible = false;
            universeGroup.scale.set(0.001, 0.001, 0.001); 
            scene.add(universeGroup);

            // ELEMENTOS DEL MUNDO
            createPortal();
            createPath();
            createMagicalHeart();
            createCelestialWings(); // NUEVO
            createGalaxyParticles();
            createFloatingWords();
            createFireflies();
            createPetalTornado(); // MEJORADO A TORNADO
            createShootingStars();
            createGeometricFlower();
            createFlashAndShockwave();
            createLotusMandalaFloor(); // NUEVO: Suelo majestuoso
            createGoldenRings();
            createNebulaSky();
            createRomanticLanterns();
            createRedThreadOfFate(); // NUEVO: Hilo Rojo del Destino

            setupInteraction();
            window.addEventListener('resize', onWindowResize, false);

            const arButton = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] });
            document.body.appendChild(arButton);
            arButton.style.display = 'none';
            
            document.getElementById('start-btn').addEventListener('click', (e) => {
                e.stopPropagation(); 
                document.getElementById('ui-layer').style.opacity = '0';
                setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 1000);
                
                document.getElementById('instruction-layer').style.display = 'flex';
                arButton.style.display = 'block';
                
                setTimeout(() => { isStarted = true; }, 500); 
            });
        }

        // --- LA PUERTA Y EL CAMINO ---
        function createPortal() {
            portalGroup = new THREE.Group();
            portalGroup.position.set(0, 0, -2.5);
            
            const ringGeo = new THREE.TorusGeometry(1.2, 0.05, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.9 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            portalGroup.add(ring);

            const veilGeo = new THREE.PlaneGeometry(2.35, 2.35);
            portalUniforms = { uTime: { value: 0 } };
            const veilMat = new THREE.ShaderMaterial({
                uniforms: portalUniforms,
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform float uTime; varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv - 0.5; float dist = length(uv); float angle = atan(uv.y, uv.x);
                        float spiral = sin(dist * 20.0 - uTime * 3.0 + angle * 2.0);
                        float alpha = smoothstep(0.5, 0.2, dist) * (0.6 + 0.4 * spiral);
                        vec3 color = mix(vec3(0.1, 0.0, 0.4), vec3(1.0, 0.4, 0.8), spiral * 0.5 + 0.5);
                        color += vec3(1.0, 0.9, 1.0) * smoothstep(0.15, 0.0, dist) * 2.0;
                        gl_FragColor = vec4(color, alpha * 0.9);
                    }
                `,
                transparent: true, side: THREE.DoubleSide, depthWrite: false
            });
            portalGroup.add(new THREE.Mesh(veilGeo, veilMat));
            scene.add(portalGroup);
        }

        function createPath() {
            pathGroup = new THREE.Group();
            const pathGeo = new THREE.PlaneGeometry(1.5, 3);
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 512, 0, 0); 
            grad.addColorStop(0, "rgba(255, 105, 180, 0)"); grad.addColorStop(1, "rgba(255, 20, 147, 0.6)"); 
            ctx.fillStyle = grad; ctx.fillRect(0, 0, 256, 512);
            const pathMat = new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
            const path = new THREE.Mesh(pathGeo, pathMat);
            path.rotation.x = -Math.PI / 2; path.position.set(0, -1.2, -1.25); 
            pathGroup.add(path); scene.add(pathGroup);
        }

        // --- CORAZÓN CENTRAL ---
        function createMagicalHeart() {
            mainHeartGroup = new THREE.Group();
            universeGroup.add(mainHeartGroup);

            const heartShape = new THREE.Shape();
            const x = 0, y = 0;
            heartShape.moveTo( x + 5, y + 5 );
            heartShape.bezierCurveTo( x + 5, y + 5, x + 4, y, x, y );
            heartShape.bezierCurveTo( x - 6, y, x - 6, y + 7, x - 6, y + 7 );
            heartShape.bezierCurveTo( x - 6, y + 11, x - 3, y + 15.4, x + 5, y + 19 );
            heartShape.bezierCurveTo( x + 12, y + 15.4, x + 16, y + 11, x + 16, y + 7 );
            heartShape.bezierCurveTo( x + 16, y + 7, x + 16, y, x + 10, y );
            heartShape.bezierCurveTo( x + 7, y, x + 5, y + 5, x + 5, y + 5 );

            const extrudeSettings = { depth: 3, bevelEnabled: true, bevelSegments: 8, steps: 4, bevelSize: 2, bevelThickness: 2 };
            const geometry = new THREE.ExtrudeGeometry( heartShape, extrudeSettings );
            geometry.computeBoundingBox(); geometry.translate( -5, -10, -1.5 );
            geometry.scale(0.02, 0.02, 0.02); geometry.rotateZ(Math.PI); 

            heartUniforms = { uTime: { value: 0.0 }, uColorA: { value: new THREE.Color(0xff1493) }, uColorB: { value: new THREE.Color(0x8a2be2) } };
            const material = new THREE.ShaderMaterial({
                uniforms: heartUniforms,
                vertexShader: `
                    varying vec2 vUv; varying vec3 vNormal; varying vec3 vPosition; uniform float uTime;
                    void main() {
                        vUv = uv; vNormal = normalize(normalMatrix * normal);
                        vec3 pos = position;
                        float wave = sin(pos.x * 20.0 + uTime * 3.0) * 0.005 + cos(pos.y * 20.0 + uTime * 2.0) * 0.005;
                        pos += normal * wave; vPosition = (modelMatrix * vec4(pos, 1.0)).xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime; uniform vec3 uColorA; uniform vec3 uColorB;
                    varying vec2 vUv; varying vec3 vNormal; varying vec3 vPosition;
                    void main() {
                        float mixValue = sin(vPosition.y * 5.0 + uTime) * 0.5 + 0.5;
                        vec3 color = mix(uColorA, uColorB, mixValue);
                        float fresnel = pow(clamp(1.0 - dot(normalize(cameraPosition - vPosition), vNormal), 0.0, 1.0), 3.0);
                        color += vec3(1.0, 0.8, 0.9) * fresnel * (abs(sin(uTime * 2.0)) * 0.5 + 0.5) * 1.5;
                        gl_FragColor = vec4(color, 0.85); 
                    }
                `,
                transparent: true, side: THREE.DoubleSide
            });
            mainHeartGroup.add(new THREE.Mesh(geometry, material));
        }

        // --- EFECTOS WOW MAJESTUOSOS ---

        // 1. ALAS CELESTIALES DE LUZ (NUEVO)
        function createCelestialWings() {
            // Generar una textura etérea procedural con hilos de luz
            const c = document.createElement('canvas'); c.width = 512; c.height = 512;
            const ctx = c.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0,0,512,512);
            ctx.globalCompositeOperation = "lighter";
            
            // Dibujar plumas de luz que se expanden desde la izquierda (la base)
            for(let i=0; i<40; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 256); // Base del ala
                const controlX = 256 + Math.random() * 150;
                const controlY = Math.random() * 512;
                const endX = 512;
                const endY = Math.random() * 512;
                ctx.quadraticCurveTo(controlX, controlY, endX, endY);
                
                const g = 150 + Math.random() * 105;
                const b = 200 + Math.random() * 55;
                ctx.strokeStyle = `rgba(255, ${g}, ${b}, 0.2)`;
                ctx.lineWidth = 2 + Math.random() * 6;
                ctx.shadowColor = `rgba(255, 105, 180, 0.8)`;
                ctx.shadowBlur = 15;
                ctx.stroke();
            }
            const wingTex = new THREE.CanvasTexture(c);
            const wingMat = new THREE.MeshBasicMaterial({ 
                map: wingTex, transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false 
            });

            // Ala Izquierda
            wingL = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), wingMat);
            wingL.geometry.translate(1.5, 0, 0); // Mover el punto de pivote a la izquierda
            wingL.position.set(0, 0, -0.1); 
            
            // Ala Derecha (Espejada)
            wingR = new THREE.Mesh(wingL.geometry, wingMat);
            wingR.rotation.y = Math.PI; 
            wingR.position.set(0, 0, -0.1);

            mainHeartGroup.add(wingL);
            mainHeartGroup.add(wingR);
        }

        // 2. EL HILO ROJO DEL DESTINO (NUEVO)
        function createRedThreadOfFate() {
            redThreadCurve = new THREE.QuadraticBezierCurve3(
                new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)
            );
            
            const numPoints = 50;
            const threadGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(numPoints * 3);
            threadGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const threadMat = new THREE.LineBasicMaterial({ 
                color: 0xff0033, linewidth: 3, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending 
            });
            
            redThreadLine = new THREE.Line(threadGeo, threadMat);
            universeGroup.add(redThreadLine);

            // Una luz/pulso que viaja por el hilo
            const pulseGeo = new THREE.SphereGeometry(0.04, 16, 16);
            const pulseMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
            threadPulse = new THREE.Mesh(pulseGeo, pulseMat);
            
            // Aura del pulso
            const auraGeo = new THREE.SphereGeometry(0.1, 16, 16);
            const auraMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
            threadPulse.add(new THREE.Mesh(auraGeo, auraMat));
            
            universeGroup.add(threadPulse);
        }

        // 3. SUELO DE LOTO MANDALA GIGANTE (NUEVO)
        function createLotusMandalaFloor() {
            const floorGeo = new THREE.PlaneGeometry(25, 25, 32, 32);
            lotusUniforms = { uTime: { value: 0.0 } };
            
            const floorMat = new THREE.ShaderMaterial({
                uniforms: lotusUniforms,
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform float uTime;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv * 2.0 - 1.0;
                        float r = length(uv);
                        float a = atan(uv.y, uv.x);
                        
                        // Generar la flor de Loto de 12 pétalos
                        float f = cos(a * 12.0);
                        float pulse = sin(uTime * 2.0) * 0.05 + 0.95;
                        float shape = smoothstep(0.5 * pulse, 0.52 * pulse, r + f * 0.1) - smoothstep(0.52 * pulse, 0.55 * pulse, r + f * 0.1);
                        
                        // Anillos interiores de energía
                        float ring = smoothstep(0.3, 0.32, r) - smoothstep(0.32, 0.35, r);
                        float ripple = sin(r * 40.0 - uTime * 4.0) * 0.5 + 0.5;
                        
                        // Colores divinos: Magenta, Oro y Azul Cósmico
                        vec3 color = vec3(1.0, 0.1, 0.5) * shape * 2.5 + vec3(1.0, 0.8, 0.0) * ring * ripple * 3.0;
                        color += vec3(0.1, 0.0, 0.3) * smoothstep(1.0, 0.0, r); // Base brillante
                        
                        float alpha = clamp((shape + ring * ripple + (1.0 - r)*0.4) * smoothstep(1.0, 0.7, r), 0.0, 1.0);
                        gl_FragColor = vec4(color, alpha * 0.6);
                    }
                `,
                transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
            });
            
            lotusMandalaFloor = new THREE.Mesh(floorGeo, floorMat);
            lotusMandalaFloor.rotation.x = -Math.PI / 2;
            lotusMandalaFloor.position.y = -1.5; // Justo bajo tus pies
            universeGroup.add(lotusMandalaFloor);
        }

        // 4. TORNADO DE PÉTALOS MAGNÉTICO (MEJORADO)
        function createPetalTornado() {
            const petalGeo = new THREE.PlaneGeometry(0.05, 0.08, 2, 2);
            const pos = petalGeo.attributes.position.array;
            for(let i=0; i<pos.length; i+=3) pos[i+2] = Math.sin(pos[i]*20) * 0.015; 
            
            const petalMat = new THREE.MeshBasicMaterial({ color: 0xff1493, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });

            for(let i=0; i<250; i++) { // Aumentamos la cantidad para el tornado
                const petal = new THREE.Mesh(petalGeo, petalMat);
                petal.userData = {
                    angle: Math.random() * Math.PI * 2,
                    radius: 0.5 + Math.random() * 4.0, // Radio del tornado
                    height: -2 + Math.random() * 10,
                    rotSpeed: 0.02 + Math.random() * 0.03, // Rotación alrededor tuyo
                    riseSpeed: 0.01 + Math.random() * 0.02, // Subida
                    tumbleX: Math.random() * 0.05,
                    tumbleY: Math.random() * 0.05
                };
                universeGroup.add(petal);
                petals.push(petal);
            }
        }

        // --- DEMÁS EFECTOS HEREDADOS Y OPTIMIZADOS ---
        function createGalaxyParticles() {
            const particleCount = 2000;
            const posArray = new Float32Array(particleCount * 3);
            const colorsArray = new Float32Array(particleCount * 3);
            for(let i = 0; i < particleCount * 3; i+=3) {
                const radius = 1 + Math.random() * 15; 
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                posArray[i] = radius * Math.sin(phi) * Math.cos(theta); posArray[i+1] = radius * Math.sin(phi) * Math.sin(theta); posArray[i+2] = radius * Math.cos(phi);
                const rand = Math.random();
                let r=1, g=0.4, b=0.7; if(rand>0.6){r=1; g=0.8; b=0;} if(rand>0.9){r=1; g=1; b=1;}
                colorsArray[i]=r; colorsArray[i+1]=g; colorsArray[i+2]=b;
            }
            const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3)); geo.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));
            
            const canvas = document.createElement('canvas'); canvas.width=16; canvas.height=16; const ctx=canvas.getContext('2d');
            const gr = ctx.createRadialGradient(8,8,0,8,8,8); gr.addColorStop(0,'white'); gr.addColorStop(1,'transparent'); ctx.fillStyle=gr; ctx.fillRect(0,0,16,16);
            const mat = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, map: new THREE.CanvasTexture(canvas) });
            particleSystem = new THREE.Points(geo, mat); universeGroup.add(particleSystem);
        }

        function createFireflies() {
            const fireflyGeo = new THREE.SphereGeometry(0.015, 8, 8); const fireflyMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
            for(let i=0; i<40; i++) {
                const fly = new THREE.Mesh(fireflyGeo, fireflyMat);
                fly.userData = { angle: Math.random() * Math.PI * 2, radius: 0.5 + Math.random() * 3, speed: 0.2 + Math.random() * 0.8, yOffset: -1.5 + Math.random() * 3, phase: Math.random() * Math.PI * 2 };
                fireflies.push(fly); universeGroup.add(fly);
            }
        }

        function createNebulaSky() {
            const domeGeo = new THREE.SphereGeometry(40, 32, 32); domeGeo.scale(-1, 1, 1);
            const domeMat = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform float uTime; varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv * 3.0;
                        float n1 = sin(uv.x * 2.0 + uTime * 0.05) * cos(uv.y * 2.0 + uTime * 0.08);
                        float n2 = sin(uv.y * 3.0 - uTime * 0.1) * 0.5;
                        float nebula = n1 + n2;
                        vec3 finalColor = mix(vec3(0.05, 0.0, 0.2), vec3(0.8, 0.1, 0.5), nebula + 0.5);
                        finalColor = mix(finalColor, vec3(1.0, 0.6, 0.0), (n2 + 0.5) * 0.4);
                        float alpha = clamp(nebula * 0.5 + 0.3, 0.0, 0.7);
                        float star = fract(sin(dot(uv, vec2(12.9898, 78.233))) * 43758.5453);
                        if(star > 0.995) { finalColor += vec3(1.0); alpha += 0.5; }
                        gl_FragColor = vec4(finalColor, alpha);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false
            });
            nebulaDome = new THREE.Mesh(domeGeo, domeMat); universeGroup.add(nebulaDome);
        }

        function createRomanticLanterns() {
            const lanternGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.35, 16);
            const lanternMat = new THREE.MeshBasicMaterial({ color: 0xffb700, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending });
            const glowGeo = new THREE.SphereGeometry(0.08, 16, 16); const glowMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for(let i=0; i<40; i++) {
                const lanternGroup = new THREE.Group();
                lanternGroup.add(new THREE.Mesh(lanternGeo, lanternMat)); lanternGroup.add(new THREE.Mesh(glowGeo, glowMat));
                lanternGroup.userData = { angle: Math.random() * Math.PI * 2, radius: 2.0 + Math.random() * 10, speed: 0.01 + Math.random() * 0.02, swaySpeed: 0.5 + Math.random() * 1.0, swayOffset: Math.random() * Math.PI * 2, yOffset: -2 + Math.random() * 15 };
                universeGroup.add(lanternGroup); lanterns.push(lanternGroup);
            }
        }

        function createGoldenRings() {
            goldenRingsGroup = new THREE.Group();
            const ringGeo = new THREE.TorusGeometry(1.2, 0.02, 32, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffdf00, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });
            const ring1 = new THREE.Mesh(ringGeo, ringMat); ring1.rotation.x = Math.PI / 3; goldenRingsGroup.add(ring1);
            const ring2 = new THREE.Mesh(ringGeo, ringMat); ring2.rotation.y = Math.PI / 3; ring2.rotation.x = -Math.PI / 4; goldenRingsGroup.add(ring2);
            mainHeartGroup.add(goldenRingsGroup); 
        }

        function createFlashAndShockwave() {
            flashSphere = new THREE.Mesh(new THREE.SphereGeometry(0.1, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, depthWrite: false, side: THREE.DoubleSide })); scene.add(flashSphere);
            shockwaveRing = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 16, 100), new THREE.MeshBasicMaterial({ color: 0xff1493, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false }));
            shockwaveRing.rotation.x = Math.PI / 2; scene.add(shockwaveRing);
        }

        function createShootingStars() {
            for(let i=0; i<10; i++) {
                const star = new THREE.Mesh(new THREE.CylinderGeometry(0.002, 0.02, 1, 4).rotateX(Math.PI/2), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1, blending: THREE.AdditiveBlending }));
                star.userData = { startPos: new THREE.Vector3(), target: new THREE.Vector3() }; resetShootingStar(star);
                universeGroup.add(star); shootingStars.push(star);
            }
        }

        function resetShootingStar(star) {
            const startX = (Math.random() - 0.5) * 40; const startZ = (Math.random() - 0.5) * 40;
            star.userData.startPos.set(startX, 15 + Math.random() * 10, startZ); star.position.copy(star.userData.startPos);
            star.userData.target.set(startX + (Math.random() - 0.5) * 30, -5, startZ + (Math.random() - 0.5) * 30);
            star.userData.speed = 0.02 + Math.random() * 0.05; star.userData.progress = 0;
            star.lookAt(star.userData.target); star.scale.set(1, 1, 5 + Math.random() * 15); 
        }

        function createGeometricFlower() {
            geometricFlower = new THREE.Group();
            const outerMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });
            const innerMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });
            const pOutGeo = new THREE.TorusGeometry(0.9, 0.012, 16, 100); pOutGeo.scale(1, 0.3, 1); 
            for(let i = 0; i < 12; i++) { const p = new THREE.Mesh(pOutGeo, outerMat); p.rotation.z = (i / 12) * Math.PI; p.rotation.x = (i % 2 === 0) ? 0.15 : -0.15; p.userData = { phase: i, isInner: false }; geometricFlower.add(p); }
            const pInGeo = new THREE.TorusGeometry(0.5, 0.015, 16, 100); pInGeo.scale(1, 0.35, 1);
            for(let i = 0; i < 8; i++) { const p = new THREE.Mesh(pInGeo, innerMat); p.rotation.z = (i / 8) * Math.PI; p.rotation.x = Math.PI / 6; p.userData = { phase: i, isInner: true }; geometricFlower.add(p); }
            mainHeartGroup.add(geometricFlower); 
        }

        function createFloatingWords() {
            frases.forEach((texto, index) => {
                const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); canvas.width = 1024; canvas.height = 128; 
                ctx.fillStyle = 'rgba(0, 0, 0, 0)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 65px Georgia"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.shadowColor = "#ff1493"; ctx.shadowBlur = 25; ctx.fillStyle = "#ffffff"; ctx.fillText(texto, canvas.width / 2, canvas.height / 2);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, blending: THREE.AdditiveBlending }));
                sprite.scale.set(4, 0.5, 1);
                sprite.userData = { angle: (index / frases.length) * Math.PI * 2, radius: 2.0 + Math.random() * 1.5, speed: 0.2 + Math.random() * 0.3, yOffset: -0.5 + Math.random() * 2.0 };
                universeGroup.add(sprite); floatingTexts.push(sprite);
            });
        }

        // --- COLISIONES Y TRANSICIONES MAESTRAS ---
        function triggerPortalCrossing(currentCamPos) {
            if (hasCrossedPortal) return; 
            hasCrossedPortal = true;
            isFlashing = true; 
            
            universeGroup.visible = true;
            userCenter.copy(currentCamPos);
            universeGroup.position.copy(userCenter);

            if(flashSphere && shockwaveRing) {
                flashSphere.position.copy(currentCamPos); flashSphere.scale.setScalar(1); flashSphere.material.opacity = 1; flashSphere.visible = true;
                shockwaveRing.position.copy(currentCamPos); shockwaveRing.scale.setScalar(1); shockwaveRing.material.opacity = 1; shockwaveRing.visible = true;
            }

            portalGroup.visible = false; pathGroup.visible = false;
            document.getElementById('instruction-layer').style.opacity = '0';
            setTimeout(()=> document.getElementById('instruction-layer').style.display = 'none', 2000);
        }

        function setupInteraction() {
            const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
            function onTouch(event) {
                if(!isStarted) return;
                if(!hasCrossedPortal) {
                    if (renderer.xr.isPresenting) {
                        const tempCamPos = new THREE.Vector3(); camera.getWorldPosition(tempCamPos); triggerPortalCrossing(tempCamPos);
                    } else { isAutoWalking = true; }
                    return;
                }
                let clientX = event.clientX || (event.touches ? event.touches[0].clientX : 0);
                let clientY = event.clientY || (event.touches ? event.touches[0].clientY : 0);
                mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = -(clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(mainHeartGroup.children);
                if (intersects.length > 0) {
                    const ring = new THREE.Mesh(new THREE.RingGeometry(0.1, 0.2, 32), new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true }));
                    ring.position.set(0, 0, 0.1); mainHeartGroup.add(ring);
                    let scale = 1;
                    function animateRing() {
                        scale += 0.2; ring.scale.set(scale, scale, scale); ring.material.opacity -= 0.05;
                        if (ring.material.opacity > 0) requestAnimationFrame(animateRing); else { mainHeartGroup.remove(ring); ring.geometry.dispose(); ring.material.dispose(); }
                    }
                    animateRing();
                }
            }
            window.addEventListener('click', onTouch); window.addEventListener('touchstart', onTouch);
        }

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

        function animate() { renderer.setAnimationLoop(render); }

        function render() {
            if(!isStarted) { renderer.render(scene, camera); return; }

            const elapsedTime = clock.getElapsedTime();
            const delta = clock.getDelta(); 
            const camPos = new THREE.Vector3();
            camera.getWorldPosition(camPos);

            if (!hasCrossedPortal) {
                portalUniforms.uTime.value = elapsedTime;
                portalGroup.rotation.y = Math.sin(elapsedTime * 0.5) * 0.1;

                if (isAutoWalking && !renderer.xr.isPresenting) {
                    camera.position.z -= delta * 5.0; // Un poco más veloz para más impacto
                    camera.getWorldPosition(camPos); 
                }
                if (camPos.distanceTo(portalGroup.position) < 1.8 || camPos.z <= portalGroup.position.z + 0.5) {
                    triggerPortalCrossing(camPos);
                }
            } 
            else {
                universeGroup.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                userCenter.lerp(camPos, 0.05);
                universeGroup.position.copy(userCenter); 
                particleSystem.position.set(0,0,0); 

                lotusUniforms.uTime.value = elapsedTime;

                // --- POSICIONAR EL CORAZÓN ---
                const forwardVec = new THREE.Vector3(0, 0, -2.0); // Flotando 2 metros al frente
                forwardVec.applyQuaternion(camera.quaternion); 
                const targetPosLocal = forwardVec.clone(); 
                
                mainHeartGroup.position.lerp(targetPosLocal, 0.05);
                mainHeartGroup.lookAt(camPos.clone().sub(userCenter)); 

                // --- ACTUALIZAR HILO ROJO DEL DESTINO ---
                if (redThreadLine) {
                    // El hilo sale de tu pecho (ligeramente abajo de los ojos)
                    const chestPosLocal = new THREE.Vector3(0, -0.4, -0.1).applyQuaternion(camera.quaternion);
                    // Como el hilo está dentro de universeGroup, sus puntos deben ser locales al userCenter
                    const startLocal = chestPosLocal.clone(); 
                    const endLocal = mainHeartGroup.position.clone();
                    const dist = startLocal.distanceTo(endLocal);
                    
                    const midLocal = startLocal.clone().lerp(endLocal, 0.5);
                    midLocal.y -= dist * 0.3; // Curva de gravedad suave
                    
                    redThreadCurve.v0.copy(startLocal);
                    redThreadCurve.v1.copy(midLocal);
                    redThreadCurve.v2.copy(endLocal);
                    
                    const pts = redThreadCurve.getPoints(49);
                    const posAttr = redThreadLine.geometry.attributes.position;
                    for(let i=0; i<50; i++) {
                        posAttr.setXYZ(i, pts[i].x, pts[i].y, pts[i].z);
                    }
                    posAttr.needsUpdate = true;

                    // Viaje del pulso de amor
                    const t = (elapsedTime * 0.6) % 1.0;
                    threadPulse.position.copy(redThreadCurve.getPoint(t));
                }

                // --- LATIDOS Y ALAS CELESTIALES ---
                heartUniforms.uTime.value = elapsedTime;
                const t = elapsedTime * 1.5;
                const beat1 = Math.pow(Math.sin(t), 10.0);
                const beat2 = Math.pow(Math.sin(t + 0.4), 10.0) * 0.5; 
                const scaleOffset = 1.0 + (beat1 + beat2) * 0.15;
                mainHeartGroup.scale.set(scaleOffset, scaleOffset, scaleOffset);

                if (wingL && wingR) {
                    // Majestuoso aleteo sincronizado
                    const flap = Math.sin(elapsedTime * 2.0) * 0.4;
                    wingL.rotation.y = flap + 0.2;
                    wingR.rotation.y = -flap - 0.2;
                }
                
                if (goldenRingsGroup) {
                    goldenRingsGroup.rotation.y += 0.01; goldenRingsGroup.rotation.z += 0.005;
                    goldenRingsGroup.children[0].rotation.x += 0.005; goldenRingsGroup.children[1].rotation.y -= 0.008;
                }
                
                if (nebulaDome) {
                    nebulaDome.material.uniforms.uTime.value = elapsedTime;
                    nebulaDome.rotation.y += 0.0005; nebulaDome.rotation.z += 0.0002;
                }

                lanterns.forEach((lantern) => {
                    const data = lantern.userData; data.yOffset += data.speed; 
                    lantern.position.y = userCenter.y + data.yOffset;
                    lantern.position.x = userCenter.x + Math.cos(data.angle) * data.radius + Math.sin(elapsedTime * data.swaySpeed + data.swayOffset) * 0.5;
                    lantern.position.z = userCenter.z + Math.sin(data.angle) * data.radius + Math.cos(elapsedTime * data.swaySpeed + data.swayOffset) * 0.5;
                    if(data.yOffset > 20) { data.yOffset = -5; data.angle = Math.random() * Math.PI * 2; data.radius = 1.5 + Math.random() * 8; }
                    lantern.rotation.z = Math.sin(elapsedTime * data.swaySpeed + data.swayOffset) * 0.1;
                    lantern.rotation.x = Math.cos(elapsedTime * data.swaySpeed + data.swayOffset) * 0.1;
                });

                floatingTexts.forEach((sprite) => {
                    const data = sprite.userData; data.angle += 0.003 * data.speed; 
                    sprite.position.x = Math.cos(data.angle) * data.radius; sprite.position.z = Math.sin(data.angle) * data.radius;
                    sprite.position.y = data.yOffset + Math.sin(elapsedTime * 2.0 + data.angle) * 0.2;
                    sprite.lookAt(camPos.clone().sub(userCenter));
                });

                fireflies.forEach((fly) => {
                    const data = fly.userData; data.angle += 0.01 * data.speed;
                    fly.position.x = Math.cos(data.angle) * data.radius; fly.position.z = Math.sin(data.angle) * data.radius;
                    fly.position.y = data.yOffset + Math.sin(elapsedTime * 3.0 + data.phase) * 0.5;
                });

                particleSystem.rotation.y = elapsedTime * 0.05;

                if(geometricFlower) {
                    geometricFlower.rotation.z -= 0.005; geometricFlower.rotation.y = Math.sin(elapsedTime * 0.5) * 0.2; geometricFlower.rotation.x = Math.cos(elapsedTime * 0.5) * 0.1;
                    const fScale = 1.0 + Math.sin(elapsedTime * 3.0) * 0.05; geometricFlower.scale.set(fScale, fScale, fScale);
                    geometricFlower.children.forEach(petal => { const breath = Math.sin(elapsedTime * (petal.userData.isInner ? 4.0 : 2.0) + petal.userData.phase) * 0.05; petal.scale.setScalar(1.0 + breath); });
                }

                // TORNADO DE PÉTALOS
                petals.forEach(petal => {
                    const data = petal.userData;
                    data.angle += data.rotSpeed; 
                    data.height += data.riseSpeed; 
                    
                    petal.position.x = Math.cos(data.angle) * data.radius;
                    petal.position.z = Math.sin(data.angle) * data.radius;
                    petal.position.y = data.height;
                    
                    petal.rotation.x += data.tumbleX; petal.rotation.y += data.tumbleY;
                    
                    if (data.height > 8) { data.height = -2; data.radius = 0.5 + Math.random() * 4.0; } // Renacer abajo
                });

                shootingStars.forEach(star => {
                    star.userData.progress += star.userData.speed;
                    star.position.lerpVectors(star.userData.startPos, star.userData.target, star.userData.progress);
                    if (star.userData.progress >= 1) resetShootingStar(star);
                });
            }

            // ONDA DE CHOQUE EXPLOSIVA Y MASIVA
            if (isFlashing) {
                if(flashSphere) { flashSphere.scale.addScalar(0.8); flashSphere.material.opacity -= 0.02; }
                if(shockwaveRing) { shockwaveRing.scale.addScalar(1.2); shockwaveRing.material.opacity -= 0.015; }
                if (flashSphere && flashSphere.material.opacity <= 0) { isFlashing = false; flashSphere.visible = false; shockwaveRing.visible = false; }
            }

            renderer.render(scene, camera);
        }

        init();
        animate();

    </script>
</body>
</html>
