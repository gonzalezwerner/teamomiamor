<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Un Universo Para Ti - AR Romántico</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030008; 
            font-family: 'Georgia', serif;
            touch-action: none; 
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, rgba(3,0,8,1) 100%);
            transition: opacity 1s ease;
        }
        #instruction-layer {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            z-index: 5;
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            transition: opacity 2s ease;
        }
        .text-glow {
            color: #fff;
            text-align: center;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff69b4, 0 0 30px #ff00ff;
            animation: pulseText 3s infinite alternate;
            padding: 20px;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; font-style: italic; color: #ffd700; text-shadow: 0 0 8px #ff8c00; }
        .instruction-text { font-size: 1.5rem; color: #aeeeee; text-shadow: 0 0 15px #00ffff; }
        
        #start-btn {
            pointer-events: auto;
            margin-top: 40px;
            padding: 15px 40px;
            font-size: 1.2rem;
            color: white;
            background: linear-gradient(45deg, #ff1493, #8a2be2);
            border: 2px solid #ffb6c1;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.6);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.9);
        }

        @keyframes pulseText {
            0% { opacity: 0.8; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        #ARButton {
            position: absolute !important;
            bottom: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 20 !important;
            background: rgba(255, 20, 147, 0.8) !important;
            border: 1px solid white !important;
            color: white !important;
            border-radius: 20px !important;
            padding: 12px 24px !important;
            font-family: inherit !important;
            font-weight: bold !important;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h1 class="text-glow">El Portal de Nuestro Amor</h1>
        <p class="text-glow">Un universo secreto aguarda por ti...</p>
        <button id="start-btn">Despertar la Magia</button>
    </div>

    <div id="instruction-layer">
        <h2 class="text-glow instruction-text">Camina hacia el portal mágico...<br><span style="font-size:0.8rem; color:#ccc;">(O toca la pantalla si no puedes caminar)</span></h2>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        // --- VARIABLES GLOBALES ---
        let scene, camera, renderer;
        let portalGroup, pathGroup, universeGroup;
        let mainHeartGroup, particleSystem;
        let heartUniforms, portalUniforms, auroraUniforms, floorUniforms;
        
        let clock = new THREE.Clock();
        let isStarted = false;
        let hasCrossedPortal = false;
        let isAutoWalking = false; // Nueva variable para simular la caminata
        
        let userCenter = new THREE.Vector3(); // El centro del universo que seguirá al usuario
        let floatingTexts = [];
        let fireflies = [];
        
        // --- NUEVAS VARIABLES SÚPER WOW ---
        let petals = [];
        let shootingStars = [];
        let geometricFlower;
        let flashSphere, shockwaveRing;
        let isFlashing = false;
        let butterflies = [];
        let auroraBorealis, magicFloor;
        
        const frases = [
            "Eres mi destino",
            "Mi alma te reconoce",
            "En cada latido, tú",
            "Mi refugio y mi paz",
            "Te amo en todos los universos",
            "Contigo, todo tiene sentido",
            "Por siempre y para siempre"
        ];

        // --- INICIALIZACIÓN ---
        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050010, 0.05);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
            camera.position.set(0, 0, 3); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true; 
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffb6c1, 0.6);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xff1493, 2, 10);
            pointLight.position.set(0, 0, 0);
            scene.add(pointLight);

            // 1. Crear el grupo del Universo (Romance), ESTRICTAMENTE OCULTO al inicio
            universeGroup = new THREE.Group();
            universeGroup.visible = false;
            universeGroup.scale.set(0.001, 0.001, 0.001); // Nace desde un punto microscópico
            scene.add(universeGroup);

            // 2. Construir Elementos
            createPortal();
            createPath();
            createMagicalHeart();
            createGalaxyParticles();
            createFloatingWords();
            createFireflies();

            // --- INICIALIZAR NUEVOS EFECTOS WOW ---
            createPetals();
            createShootingStars();
            createGeometricFlower();
            createFlashAndShockwave();
            createButterflies();
            createAuroraBorealis();
            createMagicFloor();

            setupInteraction();
            window.addEventListener('resize', onWindowResize, false);

            const arButton = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] });
            document.body.appendChild(arButton);
            arButton.style.display = 'none';
            
            document.getElementById('start-btn').addEventListener('click', () => {
                document.getElementById('ui-layer').style.opacity = '0';
                setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 1000);
                
                document.getElementById('instruction-layer').style.display = 'flex';
                arButton.style.display = 'block';
                isStarted = true;
            });
        }

        // --- LA PUERTA (PORTAL MÁGICO) ---
        function createPortal() {
            portalGroup = new THREE.Group();
            portalGroup.position.set(0, 0, -2.5);
            
            const ringGeo = new THREE.TorusGeometry(1.2, 0.05, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.9 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            portalGroup.add(ring);

            const veilGeo = new THREE.PlaneGeometry(2.35, 2.35);
            portalUniforms = { uTime: { value: 0 } };
            
            const veilMat = new THREE.ShaderMaterial({
                uniforms: portalUniforms,
                vertexShader: `
                    varying vec2 vUv;
                    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
                `,
                fragmentShader: `
                    uniform float uTime;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv - 0.5;
                        float dist = length(uv);
                        float angle = atan(uv.y, uv.x);
                        float spiral = sin(dist * 20.0 - uTime * 3.0 + angle * 2.0);
                        float alpha = smoothstep(0.5, 0.2, dist) * (0.6 + 0.4 * spiral);
                        vec3 color = mix(vec3(0.1, 0.0, 0.4), vec3(1.0, 0.4, 0.8), spiral * 0.5 + 0.5);
                        color += vec3(1.0, 0.9, 1.0) * smoothstep(0.15, 0.0, dist) * 2.0;
                        gl_FragColor = vec4(color, alpha * 0.9);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const veil = new THREE.Mesh(veilGeo, veilMat);
            portalGroup.add(veil);
            
            scene.add(portalGroup);
        }

        // --- EL CAMINO HACIA EL PORTAL ---
        function createPath() {
            pathGroup = new THREE.Group();
            const pathGeo = new THREE.PlaneGeometry(1.5, 3);
            
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 512, 0, 0); 
            grad.addColorStop(0, "rgba(255, 105, 180, 0)"); 
            grad.addColorStop(1, "rgba(255, 20, 147, 0.6)"); 
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 256, 512);
            const tex = new THREE.CanvasTexture(canvas);

            const pathMat = new THREE.MeshBasicMaterial({ 
                map: tex, transparent: true, side: THREE.DoubleSide, blending: THREE.AdditiveBlending 
            });
            const path = new THREE.Mesh(pathGeo, pathMat);
            path.rotation.x = -Math.PI / 2; 
            path.position.set(0, -1.2, -1.25); 
            pathGroup.add(path);
            
            scene.add(pathGroup);
        }

        // --- GEOMETRÍA COMPLEJA: EL CORAZÓN ---
        function createMagicalHeart() {
            mainHeartGroup = new THREE.Group();
            universeGroup.add(mainHeartGroup);

            const heartShape = new THREE.Shape();
            const x = 0, y = 0;
            heartShape.moveTo( x + 5, y + 5 );
            heartShape.bezierCurveTo( x + 5, y + 5, x + 4, y, x, y );
            heartShape.bezierCurveTo( x - 6, y, x - 6, y + 7, x - 6, y + 7 );
            heartShape.bezierCurveTo( x - 6, y + 11, x - 3, y + 15.4, x + 5, y + 19 );
            heartShape.bezierCurveTo( x + 12, y + 15.4, x + 16, y + 11, x + 16, y + 7 );
            heartShape.bezierCurveTo( x + 16, y + 7, x + 16, y, x + 10, y );
            heartShape.bezierCurveTo( x + 7, y, x + 5, y + 5, x + 5, y + 5 );

            const extrudeSettings = { depth: 3, bevelEnabled: true, bevelSegments: 8, steps: 4, bevelSize: 2, bevelThickness: 2 };
            const geometry = new THREE.ExtrudeGeometry( heartShape, extrudeSettings );
            
            geometry.computeBoundingBox();
            geometry.translate( -5, -10, -1.5 );
            geometry.scale(0.02, 0.02, 0.02);
            geometry.rotateZ(Math.PI); 

            heartUniforms = {
                uTime: { value: 0.0 },
                uColorA: { value: new THREE.Color(0xff1493) }, 
                uColorB: { value: new THREE.Color(0x8a2be2) }  
            };

            const material = new THREE.ShaderMaterial({
                uniforms: heartUniforms,
                vertexShader: `
                    varying vec2 vUv; varying vec3 vNormal; varying vec3 vPosition;
                    uniform float uTime;
                    void main() {
                        vUv = uv; vNormal = normalize(normalMatrix * normal);
                        vec3 pos = position;
                        float wave = sin(pos.x * 20.0 + uTime * 3.0) * 0.005 + cos(pos.y * 20.0 + uTime * 2.0) * 0.005;
                        pos += normal * wave;
                        vPosition = (modelMatrix * vec4(pos, 1.0)).xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime; uniform vec3 uColorA; uniform vec3 uColorB;
                    varying vec2 vUv; varying vec3 vNormal; varying vec3 vPosition;
                    void main() {
                        float mixValue = sin(vPosition.y * 5.0 + uTime) * 0.5 + 0.5;
                        vec3 color = mix(uColorA, uColorB, mixValue);
                        vec3 viewDirection = normalize(cameraPosition - vPosition);
                        float fresnel = clamp(1.0 - dot(viewDirection, vNormal), 0.0, 1.0);
                        fresnel = pow(fresnel, 3.0);
                        float pulse = abs(sin(uTime * 2.0)) * 0.5 + 0.5;
                        color += vec3(1.0, 0.8, 0.9) * fresnel * pulse * 1.5;
                        gl_FragColor = vec4(color, 0.85); 
                    }
                `,
                transparent: true, side: THREE.DoubleSide
            });

            const heartMesh = new THREE.Mesh(geometry, material);
            mainHeartGroup.add(heartMesh);

            const auraGeo = new THREE.PlaneGeometry(1.5, 1.5);
            const auraMat = new THREE.MeshBasicMaterial({
                color: 0xff1493, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false,
                map: (()=>{
                    const c = document.createElement('canvas'); c.width = 128; c.height = 128;
                    const ctx = c.getContext('2d');
                    const g = ctx.createRadialGradient(64,64,0,64,64,64);
                    g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.2,'rgba(255,105,180,0.8)'); g.addColorStop(1,'rgba(0,0,0,0)');
                    ctx.fillStyle=g; ctx.fillRect(0,0,128,128); return new THREE.CanvasTexture(c);
                })()
            });
            mainHeartGroup.add(new THREE.Mesh(auraGeo, auraMat));
        }

        // --- SISTEMA DE PARTÍCULAS ---
        function createGalaxyParticles() {
            const particleCount = 3000;
            const posArray = new Float32Array(particleCount * 3);
            const colorsArray = new Float32Array(particleCount * 3);
            const color1 = new THREE.Color(0xff69b4); const color2 = new THREE.Color(0xffd700); const color3 = new THREE.Color(0xffffff);

            for(let i = 0; i < particleCount * 3; i+=3) {
                const radius = 1 + Math.random() * 8; 
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
                posArray[i+1] = radius * Math.sin(phi) * Math.sin(theta);
                posArray[i+2] = radius * Math.cos(phi);

                const rand = Math.random();
                let c = color1; if(rand > 0.6) c = color2; if(rand > 0.9) c = color3;
                colorsArray[i] = c.r; colorsArray[i+1] = c.g; colorsArray[i+2] = c.b;
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.04, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false,
                map: (()=>{
                    const c = document.createElement('canvas'); c.width = 32; c.height = 32;
                    const ctx = c.getContext('2d');
                    const g = ctx.createRadialGradient(16,16,0,16,16,16);
                    g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.3,'rgba(255,182,193,0.8)'); g.addColorStop(1,'rgba(0,0,0,0)');
                    ctx.fillStyle=g; ctx.fillRect(0,0,32,32); return new THREE.CanvasTexture(c);
                })()
            });

            particleSystem = new THREE.Points(geo, mat);
            universeGroup.add(particleSystem);
        }

        function createFireflies() {
            const fireflyGeo = new THREE.SphereGeometry(0.015, 8, 8);
            const fireflyMat = new THREE.MeshBasicMaterial({ color: 0xfffafa, transparent: true, opacity: 0.9 });
            
            for(let i=0; i<60; i++) {
                const fly = new THREE.Mesh(fireflyGeo, fireflyMat);
                fly.userData = {
                    angle: Math.random() * Math.PI * 2,
                    radius: 0.5 + Math.random() * 3,
                    speed: 0.2 + Math.random() * 0.8,
                    yOffset: -1.5 + Math.random() * 3,
                    phase: Math.random() * Math.PI * 2
                };
                fireflies.push(fly);
                universeGroup.add(fly);
            }
        }

        // --- LOS NUEVOS EFECTOS SÚPER WOW ---
        
        function createButterflies() {
            // Mariposas de cristal con alas que aletean
            const wingGeo = new THREE.PlaneGeometry(0.06, 0.1);
            wingGeo.translate(0.03, 0, 0); // Anclar el ala por el borde
            const wingMat = new THREE.MeshBasicMaterial({
                color: 0x00ffff, transparent: true, opacity: 0.6, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
            });

            for(let i=0; i<25; i++) {
                const butterfly = new THREE.Group();
                const wing1 = new THREE.Mesh(wingGeo, wingMat);
                const wing2 = new THREE.Mesh(wingGeo, wingMat);
                wing2.rotation.y = Math.PI; // Espejar la segunda ala
                
                butterfly.add(wing1, wing2);
                
                butterfly.userData = {
                    angle: Math.random() * Math.PI * 2,
                    radius: 0.5 + Math.random() * 2.5,
                    heightOffset: -1 + Math.random() * 2,
                    speed: 0.5 + Math.random() * 1.5,
                    flapSpeed: 15 + Math.random() * 10,
                    wing1: wing1,
                    wing2: wing2
                };
                
                universeGroup.add(butterfly);
                butterflies.push(butterfly);
            }
        }

        function createAuroraBorealis() {
            // Una inmensa cortina de luz procedural
            const auroraGeo = new THREE.CylinderGeometry(8, 8, 15, 64, 1, true);
            auroraUniforms = { uTime: { value: 0.0 } };
            
            const auroraMat = new THREE.ShaderMaterial({
                uniforms: auroraUniforms,
                vertexShader: `
                    varying vec2 vUv;
                    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
                `,
                fragmentShader: `
                    uniform float uTime;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        float wave1 = sin(uv.x * 15.0 + uTime * 0.5) * 0.5 + 0.5;
                        float wave2 = sin(uv.x * 25.0 - uTime * 0.8) * 0.5 + 0.5;
                        float alpha = sin(uv.y * 3.1415) * (wave1 * wave2); // Difuminar arriba y abajo
                        vec3 color = mix(vec3(0.0, 1.0, 0.8), vec3(0.8, 0.0, 1.0), uv.y + wave1*0.3); // Cian a Magenta
                        gl_FragColor = vec4(color, alpha * 0.35); // Translúcido
                    }
                `,
                transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
            });
            
            auroraBorealis = new THREE.Mesh(auroraGeo, auroraMat);
            universeGroup.add(auroraBorealis);
        }

        function createMagicFloor() {
            // Suelo que pulsa ondas de energía
            const floorGeo = new THREE.PlaneGeometry(20, 20, 32, 32);
            floorUniforms = { uTime: { value: 0.0 } };
            
            const floorMat = new THREE.ShaderMaterial({
                uniforms: floorUniforms,
                vertexShader: `
                    varying vec2 vUv;
                    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
                `,
                fragmentShader: `
                    uniform float uTime;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv - 0.5;
                        float dist = length(uv);
                        float ripple = sin(dist * 40.0 - uTime * 5.0) * 0.5 + 0.5;
                        float alpha = smoothstep(0.5, 0.0, dist) * ripple;
                        vec3 color = vec3(0.2, 0.8, 1.0); // Azul eléctrico
                        gl_FragColor = vec4(color, alpha * 0.4);
                    }
                `,
                transparent: true, side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending
            });
            
            magicFloor = new THREE.Mesh(floorGeo, floorMat);
            magicFloor.rotation.x = -Math.PI / 2;
            magicFloor.position.y = -1.5; // Bajo los pies
            universeGroup.add(magicFloor);
        }

        function createFlashAndShockwave() {
            // 1. Esfera Flash
            const geo = new THREE.SphereGeometry(0.1, 32, 32);
            const mat = new THREE.MeshBasicMaterial({
                color: 0xffffff, transparent: true, opacity: 0, depthWrite: false, side: THREE.DoubleSide
            });
            flashSphere = new THREE.Mesh(geo, mat);
            scene.add(flashSphere);

            // 2. Anillo Shockwave
            const ringGeo = new THREE.TorusGeometry(0.5, 0.05, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({
                color: 0x00ffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false
            });
            shockwaveRing = new THREE.Mesh(ringGeo, ringMat);
            shockwaveRing.rotation.x = Math.PI / 2; // Acostado
            scene.add(shockwaveRing);
        }

        function createPetals() {
            const petalGeo = new THREE.PlaneGeometry(0.04, 0.06, 2, 2);
            const pos = petalGeo.attributes.position.array;
            for(let i=0; i<pos.length; i+=3) pos[i+2] = Math.sin(pos[i]*20) * 0.01; 
            
            const petalMat = new THREE.MeshBasicMaterial({ 
                color: 0xff1493, side: THREE.DoubleSide, transparent: true, opacity: 0.85 
            });

            for(let i=0; i<150; i++) {
                const petal = new THREE.Mesh(petalGeo, petalMat);
                petal.position.set((Math.random()-0.5)*8, Math.random()*8, (Math.random()-0.5)*8);
                petal.userData = {
                    speed: 0.01 + Math.random()*0.02,
                    sway: Math.random() * Math.PI * 2,
                    swaySpeed: 0.01 + Math.random()*0.03,
                    rotSpeedX: Math.random()*0.05,
                    rotSpeedY: Math.random()*0.05
                };
                universeGroup.add(petal);
                petals.push(petal);
            }
        }

        function createShootingStars() {
            for(let i=0; i<8; i++) {
                const starGeo = new THREE.CylinderGeometry(0.002, 0.01, 1, 4);
                starGeo.rotateX(Math.PI / 2); 
                const starMat = new THREE.MeshBasicMaterial({ 
                    color: 0xffffff, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending 
                });
                const star = new THREE.Mesh(starGeo, starMat);
                
                star.userData = { startPos: new THREE.Vector3(), target: new THREE.Vector3() };
                resetShootingStar(star);
                
                universeGroup.add(star);
                shootingStars.push(star);
            }
        }

        function resetShootingStar(star) {
            const startX = (Math.random() - 0.5) * 20;
            const startY = 5 + Math.random() * 5;
            const startZ = (Math.random() - 0.5) * 20;
            star.userData.startPos.set(startX, startY, startZ);
            star.position.copy(star.userData.startPos);
            star.userData.target.set(startX + (Math.random() - 0.5) * 15, startY - 10 - Math.random() * 5, startZ + (Math.random() - 0.5) * 15);
            star.userData.speed = 0.015 + Math.random() * 0.04;
            star.userData.progress = 0;
            star.lookAt(star.userData.target);
            star.scale.set(1, 1, 3 + Math.random() * 8); 
        }

        function createGeometricFlower() {
            geometricFlower = new THREE.Group();
            const outerMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });
            const innerMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, side: THREE.DoubleSide });

            const numPetalsOut = 12;
            const petalGeoOut = new THREE.TorusGeometry(0.9, 0.012, 16, 100);
            petalGeoOut.scale(1, 0.3, 1); 
            for(let i = 0; i < numPetalsOut; i++) {
                const petal = new THREE.Mesh(petalGeoOut, outerMat);
                petal.rotation.z = (i / numPetalsOut) * Math.PI;
                petal.rotation.x = (i % 2 === 0) ? 0.15 : -0.15; 
                petal.userData = { phase: i, isInner: false };
                geometricFlower.add(petal);
            }

            const numPetalsIn = 8;
            const petalGeoIn = new THREE.TorusGeometry(0.5, 0.015, 16, 100);
            petalGeoIn.scale(1, 0.35, 1);
            for(let i = 0; i < numPetalsIn; i++) {
                const petal = new THREE.Mesh(petalGeoIn, innerMat);
                petal.rotation.z = (i / numPetalsIn) * Math.PI;
                petal.rotation.x = Math.PI / 6; 
                petal.userData = { phase: i, isInner: true };
                geometricFlower.add(petal);
            }
            mainHeartGroup.add(geometricFlower); 
        }

        function createFloatingWords() {
            frases.forEach((texto, index) => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 1024; canvas.height = 128; 
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 60px Georgia"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.shadowColor = "#ff1493"; ctx.shadowBlur = 20; ctx.fillStyle = "#ffffff";
                ctx.fillText(texto, canvas.width / 2, canvas.height / 2);

                const texture = new THREE.CanvasTexture(canvas);
                const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true, blending: THREE.AdditiveBlending });
                
                const sprite = new THREE.Sprite(spriteMaterial);
                sprite.scale.set(3, 0.375, 1);
                sprite.userData = { angle: (index / frases.length) * Math.PI * 2, radius: 1.5 + Math.random() * 1.0, speed: 0.3 + Math.random() * 0.4, yOffset: -0.5 + Math.random() * 1.5 };
                universeGroup.add(sprite);
                floatingTexts.push(sprite);
            });
        }

        // --- INTERACCIONES ---
        function setupInteraction() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            function onTouch(event) {
                if(!isStarted) return;
                
                // Si aún no hemos cruzado el portal...
                if(!hasCrossedPortal) {
                    if (renderer.xr.isPresenting) {
                        // En AR, si tocan la pantalla pero no pueden caminar,
                        // traemos el portal violentamente hacia la cámara
                        portalGroup.position.z = camera.position.z - 0.1; 
                    } else {
                        // En escritorio/móvil normal, iniciamos caminata automática
                        isAutoWalking = true;
                    }
                    return;
                }

                let clientX = event.clientX || (event.touches ? event.touches[0].clientX : 0);
                let clientY = event.clientY || (event.touches ? event.touches[0].clientY : 0);
                mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = -(clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(mainHeartGroup.children);
                if (intersects.length > 0) {
                    const ring = new THREE.Mesh(
                        new THREE.RingGeometry(0.1, 0.2, 32),
                        new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true })
                    );
                    ring.position.set(0, 0, 0.1); 
                    mainHeartGroup.add(ring);

                    let scale = 1;
                    function animateRing() {
                        scale += 0.2; ring.scale.set(scale, scale, scale); ring.material.opacity -= 0.05;
                        if (ring.material.opacity > 0) requestAnimationFrame(animateRing);
                        else { mainHeartGroup.remove(ring); ring.geometry.dispose(); ring.material.dispose(); }
                    }
                    animateRing();
                }
            }
            window.addEventListener('click', onTouch);
            window.addEventListener('touchstart', onTouch);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- BUCLE DE ANIMACIÓN PRINCIPAL ---
        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            if(!isStarted) { renderer.render(scene, camera); return; }

            const elapsedTime = clock.getElapsedTime();
            const delta = clock.getDelta(); // Obtenemos el tiempo transcurrido por frame
            
            const camPos = new THREE.Vector3();
            camera.getWorldPosition(camPos);

            // 1. FASE DE PORTAL (Mundo totalmente oculto hasta cruzar)
            if (!hasCrossedPortal) {
                portalUniforms.uTime.value = elapsedTime;
                portalGroup.rotation.y = Math.sin(elapsedTime * 0.5) * 0.1;

                // LÓGICA DE CAMINATA AUTOMÁTICA
                if (isAutoWalking && !renderer.xr.isPresenting) {
                    camera.position.z -= delta * 3.0; // Avanzar 3 metros por segundo visualmente
                    camera.getWorldPosition(camPos); // Actualizar posición después de moverse
                }

                // Lógica ESTRICTA de colisión con el portal
                // Activamos SOLO cuando la cámara pasa la coordenada Z del portal
                if (camPos.z <= portalGroup.position.z + 0.1 && Math.abs(camPos.x - portalGroup.position.x) < 2.0) {
                    hasCrossedPortal = true;
                    
                    // ¡DISPARAR LA EXPLOSIÓN DE REVELACIÓN EXACTAMENTE AL CRUZAR!
                    isFlashing = true; 
                    
                    // Nacer el universo instantáneamente
                    universeGroup.visible = true;
                    userCenter.copy(camPos);
                    universeGroup.position.copy(userCenter);

                    if(flashSphere && shockwaveRing) {
                        flashSphere.position.copy(camPos);
                        flashSphere.scale.setScalar(1);
                        flashSphere.material.opacity = 1; 
                        flashSphere.visible = true;

                        shockwaveRing.position.copy(camPos);
                        shockwaveRing.scale.setScalar(1);
                        shockwaveRing.material.opacity = 1;
                        shockwaveRing.visible = true;
                    }

                    portalGroup.visible = false;
                    pathGroup.visible = false;

                    document.getElementById('instruction-layer').style.opacity = '0';
                    setTimeout(()=> document.getElementById('instruction-layer').style.display = 'none', 2000);
                }
            } 
            
            // 2. FASE DE UNIVERSO INMERSIVO (Después de cruzar)
            else {
                // Escala fluida pero rápida para que nazca a tu alrededor
                universeGroup.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);

                userCenter.lerp(camPos, 0.05);
                universeGroup.position.copy(userCenter); // Todo el grupo sigue al usuario
                particleSystem.position.set(0,0,0); 

                auroraUniforms.uTime.value = elapsedTime;
                floorUniforms.uTime.value = elapsedTime;

                const forwardVec = new THREE.Vector3(0, 0, -1.5);
                forwardVec.applyQuaternion(camera.quaternion); 
                const targetPosLocal = forwardVec.clone(); 
                
                mainHeartGroup.position.lerp(targetPosLocal, 0.05);
                mainHeartGroup.lookAt(camPos.clone().sub(userCenter)); 

                heartUniforms.uTime.value = elapsedTime;
                const t = elapsedTime * 1.5;
                const beat1 = Math.pow(Math.sin(t), 10.0);
                const beat2 = Math.pow(Math.sin(t + 0.4), 10.0) * 0.5; 
                const scaleOffset = 1.0 + (beat1 + beat2) * 0.15;
                mainHeartGroup.scale.set(scaleOffset, scaleOffset, scaleOffset);
                
                floatingTexts.forEach((sprite) => {
                    const data = sprite.userData;
                    data.angle += 0.003 * data.speed; 
                    sprite.position.x = Math.cos(data.angle) * data.radius;
                    sprite.position.z = Math.sin(data.angle) * data.radius;
                    sprite.position.y = data.yOffset + Math.sin(elapsedTime * 2.0 + data.angle) * 0.2;
                    sprite.lookAt(camPos.clone().sub(userCenter));
                });

                butterflies.forEach((butterfly) => {
                    const data = butterfly.userData;
                    data.angle += 0.008 * data.speed;
                    
                    butterfly.position.x = Math.cos(data.angle) * data.radius;
                    butterfly.position.z = Math.sin(data.angle) * data.radius;
                    butterfly.position.y = data.heightOffset + Math.sin(elapsedTime * 2.0 + data.angle) * 0.5;
                    
                    const flap = Math.sin(elapsedTime * data.flapSpeed);
                    data.wing1.rotation.y = flap * 0.8;
                    data.wing2.rotation.y = Math.PI - (flap * 0.8);

                    butterfly.rotation.y = -data.angle;
                });

                fireflies.forEach((fly) => {
                    const data = fly.userData;
                    data.angle += 0.01 * data.speed;
                    fly.position.x = Math.cos(data.angle) * data.radius;
                    fly.position.z = Math.sin(data.angle) * data.radius;
                    fly.position.y = data.yOffset + Math.sin(elapsedTime * 3.0 + data.phase) * 0.5;
                });

                particleSystem.rotation.y = elapsedTime * 0.05;

                if(geometricFlower) {
                    geometricFlower.rotation.z -= 0.005; 
                    geometricFlower.rotation.y = Math.sin(elapsedTime * 0.5) * 0.2; 
                    geometricFlower.rotation.x = Math.cos(elapsedTime * 0.5) * 0.1;
                    const fScale = 1.0 + Math.sin(elapsedTime * 3.0) * 0.05;
                    geometricFlower.scale.set(fScale, fScale, fScale);

                    geometricFlower.children.forEach(petal => {
                        const speed = petal.userData.isInner ? 4.0 : 2.0;
                        const breath = Math.sin(elapsedTime * speed + petal.userData.phase) * 0.05;
                        petal.scale.setScalar(1.0 + breath);
                    });
                }

                petals.forEach(petal => {
                    petal.position.y -= petal.userData.speed;
                    petal.position.x += Math.sin(elapsedTime * petal.userData.swaySpeed + petal.userData.sway) * 0.015;
                    petal.rotation.x += petal.userData.rotSpeedX;
                    petal.rotation.y += petal.userData.rotSpeedY;
                    
                    if (petal.position.y < -3) {
                        petal.position.y = 4 + Math.random() * 2;
                        petal.position.x = (Math.random() - 0.5) * 8;
                        petal.position.z = (Math.random() - 0.5) * 8;
                    }
                });

                shootingStars.forEach(star => {
                    star.userData.progress += star.userData.speed;
                    star.position.lerpVectors(star.userData.startPos, star.userData.target, star.userData.progress);
                    if (star.userData.progress >= 1) resetShootingStar(star);
                });
            }

            // --- EFECTO DE TRANSICIÓN ONDA DE CHOQUE ---
            if (isFlashing) {
                if(flashSphere) {
                    flashSphere.scale.addScalar(0.4); 
                    flashSphere.material.opacity -= 0.015; 
                }
                if(shockwaveRing) {
                    shockwaveRing.scale.addScalar(0.6); 
                    shockwaveRing.material.opacity -= 0.02;
                }
                
                if (flashSphere && flashSphere.material.opacity <= 0) {
                    isFlashing = false;
                    flashSphere.visible = false;
                    shockwaveRing.visible = false;
                }
            }

            renderer.render(scene, camera);
        }

        init();
        animate();

    </script>
</body>
</html>
