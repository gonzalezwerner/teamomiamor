<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Un Univers Per A Tu - AR Romàntic</title>
    <style>
        /* --- ESTILS DE LA INTERFÍCIE (UI) --- */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010005; 
            font-family: 'Georgia', serif;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; 
            background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, rgba(1,0,5,1) 100%);
            transition: opacity 1.5s ease-in-out;
        }
        #instruction-layer {
            position: absolute;
            top: 10%;
            left: 0;
            width: 100%;
            z-index: 5;
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            transition: opacity 2s ease;
        }
        .text-glow {
            color: #ffffff;
            text-align: center;
            text-shadow: 0 0 10px #ff1493, 0 0 20px #ff69b4, 0 0 40px #ff00ff, 0 0 80px #8a2be2;
            animation: pulseText 4s infinite alternate;
            padding: 20px;
            margin: 0;
        }
        h1 { 
            font-size: 4rem; 
            margin-bottom: 10px; 
            letter-spacing: 2px;
            font-weight: normal;
        }
        p { 
            font-size: 1.5rem; 
            font-style: italic; 
            color: #ffd700; 
            text-shadow: 0 0 10px #ff8c00, 0 0 20px #ff0000; 
            letter-spacing: 1px;
        }
        .instruction-text { 
            font-size: 1.8rem; 
            color: #e0ffff; 
            text-shadow: 0 0 15px #00ffff, 0 0 30px #00ced1; 
            background: rgba(0, 50, 100, 0.4); 
            padding: 20px 40px; 
            border-radius: 30px; 
            border: 2px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            animation: floatUI 3s ease-in-out infinite;
        }
        
        #start-btn {
            pointer-events: auto;
            margin-top: 60px;
            padding: 18px 50px;
            font-size: 1.4rem;
            color: white;
            background: linear-gradient(135deg, #ff1493, #8a2be2, #ff1493);
            background-size: 200% 200%;
            border: 2px solid #ffb6c1;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 20, 147, 0.8), inset 0 0 10px rgba(255,255,255,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: bold;
            animation: gradientShift 5s ease infinite;
        }
        #start-btn:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 10px 40px rgba(255, 20, 147, 1), inset 0 0 20px rgba(255,255,255,0.8);
            letter-spacing: 6px;
        }

        @keyframes pulseText {
            0% { opacity: 0.8; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatUI {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        #ARButton {
            position: absolute !important;
            bottom: 30px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 20 !important;
            background: rgba(255, 20, 147, 0.9) !important;
            border: 2px solid white !important;
            color: white !important;
            border-radius: 30px !important;
            padding: 15px 30px !important;
            font-family: inherit !important;
            font-weight: bold !important;
            letter-spacing: 1px !important;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.8) !important;
            transition: all 0.3s ease !important;
        }
        #ARButton:hover {
            background: rgba(138, 43, 226, 0.9) !important;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.8) !important;
        }

        /* Elements decoratius de la UI */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>

        // Col·leccions d'Elements

        // Materials i Uniforms de Shaders
        let heartUniforms, portalUniforms, lotusUniforms, auroraUniforms, nebulaUniforms;
        let innerCoreUniforms, wireframeUniforms;
        
        // Elements Unics
        let flashSphere, shockwaveRing, shockwaveDisk;
        let isFlashing = false;
        let sacredHalosGroup; // NOVA: Geometria Sagrada
        let goldenRingsGroup;
        let nebulaDome;
        let wingL, wingR;
        let redThreadCurve, redThreadLine, threadPulse;

        let crystalLotusGroup; // NOVA: Loto de Cristall

        // ============================================================================
        // FRASES ULTRA-ROMÁNTICAS (NIVEL DIOS)
        // ============================================================================
        const frasesAmor = [

        // ============================================================================
        // 2. INICIALITZACIÓ DEL MOTOR GRÀFIC
        // ============================================================================
        function init() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x010005, 0.03); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 200);
            camera.position.set(0, 0, 3); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            renderer.xr.enabled = true; 
            
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            setupLighting();

            universeGroup.visible = false;
            universeGroup.scale.set(0.0001, 0.0001, 0.0001); 
            scene.add(universeGroup);

            construirMónPrePortal();
            construirMónPostPortal();

            setupInteraction();
            window.addEventListener('resize', onWindowResize, false);

            setupAR();
            configurarBotoInici();
        }

        function setupLighting() {
            const ambientLight = new THREE.AmbientLight(0xffb6c1, 0.8);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0xff1493, 3, 20);
            pointLight.position.set(0, 2, 0);
            scene.add(pointLight);
            
            const blueLight = new THREE.PointLight(0x00ffff, 2, 30);
            blueLight.position.set(0, 10, -10);
            universeGroup.add(blueLight);
        }

        function setupAR() {
            const arButton = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] });
            arButton.id = "ARButton";
            document.body.appendChild(arButton);
            arButton.style.display = 'none';
        }

        function configurarBotoInici() {
            document.getElementById('start-btn').addEventListener('click', (e) => {
                e.stopPropagation(); 
                document.getElementById('ui-layer').style.opacity = '0';
                setTimeout(() => document.getElementById('ui-layer').style.display = 'none', 1500);
                
                document.getElementById('instruction-layer').style.display = 'flex';
                const arBtn = document.getElementById('ARButton');
                if(arBtn) arBtn.style.display = 'block';
                
                setTimeout(() => { isStarted = true; }, 800); 
            });
        }

        // ============================================================================
        // 3. CONSTRUCCIÓ DEL PRE-PORTAL (La Porta d'Entrada)
        // ============================================================================
        function construirMónPrePortal() {
            scene.add(portalGroup);
            portalGroup.position.set(0, 0, -2.8);
            
            const ringGeo = new THREE.TorusGeometry(1.4, 0.06, 32, 150);
            const ringMat = new THREE.MeshStandardMaterial({ 
                color: 0xffd700, metalness: 1.0, roughness: 0.1, emissive: 0xffa500, emissiveIntensity: 0.5 
            });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            portalGroup.add(ring);

            const innerRingGeo = new THREE.TorusGeometry(1.3, 0.02, 16, 100);
            const innerRingMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
            portalGroup.add(new THREE.Mesh(innerRingGeo, innerRingMat));

            const veilGeo = new THREE.PlaneGeometry(2.7, 2.7, 64, 64);
            portalUniforms = { uTime: { value: 0 } };
            const veilMat = new THREE.ShaderMaterial({
                uniforms: portalUniforms,
                vertexShader: `
                    varying vec2 vUv; 
                    uniform float uTime;
                    void main() { 
                        vUv = uv; 
                        vec3 pos = position;
                        float dist = distance(uv, vec2(0.5));
                        pos.z += sin(dist * 10.0 - uTime * 2.0) * 0.1;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0); 
                    }
                `,
                fragmentShader: `
                    uniform float uTime; varying vec2 vUv;
                    
                    float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
                    float noise(vec2 p) {
                        vec2 i = floor(p); vec2 f = fract(p);
                        vec2 u = f*f*(3.0-2.0*f);
                        return mix(mix(hash(i + vec2(0.0,0.0)), hash(i + vec2(1.0,0.0)), u.x),
                                   mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);
                    }
                    
                    void main() {
                        vec2 uv = vUv - 0.5; 
                        float dist = length(uv); 
                        float angle = atan(uv.y, uv.x);
                        
                        float spiral1 = sin(dist * 25.0 - uTime * 4.0 + angle * 3.0);
                        float spiral2 = cos(dist * 15.0 + uTime * 2.0 - angle * 2.0);
                        float vortex = (spiral1 + spiral2) * 0.5;
                        
                        float n = noise(uv * 10.0 - uTime);
                        vortex += n * 0.5;
                        
                        float alpha = smoothstep(0.5, 0.1, dist) * (0.5 + 0.5 * vortex);
                        
                        vec3 color1 = vec3(0.05, 0.0, 0.2); 
                        vec3 color2 = vec3(1.0, 0.2, 0.6); 
                        vec3 color3 = vec3(0.0, 1.0, 1.0); 
                        
                        vec3 color = mix(color1, color2, vortex + 0.5);
                        color = mix(color, color3, smoothstep(0.2, 0.0, dist));
                        
                        color += vec3(1.0, 1.0, 1.0) * pow(smoothstep(0.15, 0.0, dist), 3.0) * 3.0;
                        
                        gl_FragColor = vec4(color, alpha);
                    }
                `,
                transparent: true, side: THREE.DoubleSide, depthWrite: false
            });
            portalGroup.add(new THREE.Mesh(veilGeo, veilMat));

            crearCamiLluminos();
        }

        function crearCamiLluminos() {
            pathGroup = new THREE.Group();
            const pathGeo = new THREE.PlaneGeometry(1.8, 4, 32, 32);
            
            const pathMat = new THREE.ShaderMaterial({
                uniforms: { uTime: portalUniforms.uTime },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform float uTime; varying vec2 vUv;
                    void main() {
                        float flow = sin(vUv.y * 20.0 + uTime * 5.0) * 0.5 + 0.5;
                        float edge = sin(vUv.x * 3.1415);
                        float fade = smoothstep(0.0, 1.0, vUv.y);
                        
                        vec3 color = vec3(1.0, 0.1, 0.6) * flow;
                        color += vec3(0.5, 0.0, 1.0) * (1.0 - flow);
                        
                        gl_FragColor = vec4(color, edge * fade * 0.6);
                    }
                `,
                transparent: true, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
            });
            
            const path = new THREE.Mesh(pathGeo, pathMat);
            path.rotation.x = -Math.PI / 2; 
            path.position.set(0, -1.3, -1.0); 
            pathGroup.add(path); 
            scene.add(pathGroup);
        }

        // ============================================================================
        // 4. CONSTRUCCIÓ DEL POST-PORTAL (El Santuari Còsmic Ultra Romàntic)
        // ============================================================================
        function construirMónPostPortal() {
            crearCorUltraComplex();
            crearLotoDeCristall(); // NOU: Loto de cristall base
            crearHalosSagrats(); // NOU: Halos de geometría
            crearAlesCelestials();
            crearTornatDePetals();
            crearSistemaBoids(); 
            crearSòlMandalaLoto();
            crearVoltaNebulosa();

            crearLlanternesRomanitques();
            crearFilVermellDesti();
            crearPilarsDeLlum();
            crearDiamantsLevitants(); // NOU: Diamants brillants
            crearSistemaCometes(); // NOU: Meteoritos con estela
            crearParticulesGalaxia();
            crearTextosFlotants();
            crearOnaDeXoc();
            crearJardiDeRosesParametriques(); 
        }

        // --- NOU SISTEMA: HALOS DE GEOMETRÍA SAGRADA PROCEDURALS ---
        function crearHalosSagrats() {
            sacredHalosGroup = new THREE.Group();
            
            // Funció per dibuixar mandales ultra-complexos al Canvas
            function generarTexturaHalo(radi, color, runes) {
                const canvas = document.createElement('canvas'); 
                canvas.width = 1024; canvas.height = 1024;
                const ctx = canvas.getContext('2d');
                const cx = 512, cy = 512;
                
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;
                
                // Anell base
                ctx.beginPath();
                ctx.arc(cx, cy, radi, 0, Math.PI * 2);
                ctx.stroke();

                // Línies geomètriques internes
                for(let i=0; i<36; i++) {
                    const angle = (i/36) * Math.PI * 2;
                    ctx.beginPath();
                    ctx.moveTo(cx + Math.cos(angle)*radi*0.9, cy + Math.sin(angle)*radi*0.9);
                    ctx.lineTo(cx + Math.cos(angle)*radi*0.95, cy + Math.sin(angle)*radi*0.95);
                    ctx.stroke();
                }

                // Símbols o Runes de l'amor
                if(runes) {
                    ctx.font = "24px Arial";
                    ctx.fillStyle = color;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    const chars = "AMOR ETERN DESTI INFINIT LÍMIT ÀNIMA FOC BATEC LÍMIT".split(" ");
                    for(let i=0; i<12; i++) {
                        const angle = (i/12) * Math.PI * 2;
                        const px = cx + Math.cos(angle) * (radi * 0.85);
                        const py = cy + Math.sin(angle) * (radi * 0.85);
                        
                        ctx.save();
                        ctx.translate(px, py);
                        ctx.rotate(angle + Math.PI/2);
                        ctx.fillText(chars[i%chars.length], 0, 0);
                        ctx.restore();
                    }
                }
                
                return new THREE.CanvasTexture(canvas);
            }

            const mat1 = new THREE.MeshBasicMaterial({ map: generarTexturaHalo(450, '#ff1493', true), transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false });
            const mat2 = new THREE.MeshBasicMaterial({ map: generarTexturaHalo(400, '#00ffff', false), transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false });
            const mat3 = new THREE.MeshBasicMaterial({ map: generarTexturaHalo(480, '#ffd700', true), transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false });

            const planeGeo = new THREE.PlaneGeometry(3, 3);
            
            const halo1 = new THREE.Mesh(planeGeo, mat1);
            const halo2 = new THREE.Mesh(planeGeo, mat2);
            const halo3 = new THREE.Mesh(planeGeo, mat3);

            halo1.rotation.x = Math.PI / 2;
            halo2.rotation.y = Math.PI / 2;
            halo3.rotation.x = Math.PI / 4;
            halo3.rotation.y = Math.PI / 4;

            sacredHalosGroup.add(halo1, halo2, halo3);
            mainHeartGroup.add(sacredHalosGroup); // Posa l'halo dins del cor
        }

        // --- NOU SISTEMA: LOTO DE CRISTALL DE BASE ---
        function crearLotoDeCristall() {
            crystalLotusGroup = new THREE.Group();
            
            // Material de cristall refractant (Simulat amb Shader)
            const glassMat = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0.0 } },
                vertexShader: `
                    varying vec3 vNormal; varying vec3 vViewPosition;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        vViewPosition = -mvPosition.xyz;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform float uTime;
                    varying vec3 vNormal; varying vec3 vViewPosition;
                    void main() {
                        vec3 normal = normalize(vNormal);
                        vec3 viewDir = normalize(vViewPosition);
                        
                        // Iridescència hologràfica
                        float fresnel = dot(viewDir, normal);
                        fresnel = clamp(1.0 - fresnel, 0.0, 1.0);
                        
                        vec3 color = vec3(0.0);
                        color.r = sin(fresnel * 10.0 + uTime) * 0.5 + 0.5;
                        color.g = sin(fresnel * 15.0 + uTime * 1.5) * 0.5 + 0.5;
                        color.b = sin(fresnel * 20.0 + uTime * 2.0) * 0.5 + 0.5;
                        
                        color *= fresnel * 2.0;
                        color += vec3(1.0, 0.8, 0.9) * pow(fresnel, 5.0); // Borde blanc brillant
                        
                        gl_FragColor = vec4(color, fresnel * 0.8);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false
            });

            // Construir els pètals del Loto de Cristall
            for(let i=0; i<12; i++) {
                const petalGeo = new THREE.PlaneGeometry(0.8, 1.5, 8, 8);
                const pos = petalGeo.attributes.position;
                for(let j=0; j<pos.count; j++) {
                    const x = pos.getX(j); const y = pos.getY(j);
                    pos.setZ(j, (x*x + y*y) * -0.5); // Curvar
                }
                petalGeo.computeVertexNormals();
                petalGeo.translate(0, 0.75, 0); // Moure pivot a la base

                const petal = new THREE.Mesh(petalGeo, glassMat);
                petal.rotation.y = (i / 12) * Math.PI * 2;
                petal.rotation.x = Math.PI / 4; // Obrir
                
                // Animar individualment
                petal.userData = { phase: i };
                crystalLotusGroup.add(petal);
            }
            
            crystalLotusGroup.position.y = -0.5; // Sota el cor
            mainHeartGroup.add(crystalLotusGroup);
        }

        // --- NOU SISTEMA: DIAMANTS FLOTANTS ---
        function crearDiamantsLevitants() {
            const diamondGeo = new THREE.OctahedronGeometry(0.1, 0);
            const diamondMat = new THREE.MeshStandardMaterial({

        // --- NOU SISTEMA: COMETES AMB ESTELA ---
        function crearSistemaCometes() {
            const cometCount = 12;
            const cometGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const cometMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            for(let i=0; i<cometCount; i++) {
                const cometGroup = new THREE.Group();
                const head = new THREE.Mesh(cometGeo, cometMat);
                cometGroup.add(head);

                // Estela (Trail) usant BufferGeometry dinàmica
                const tailPoints = 20;
                const tailGeo = new THREE.BufferGeometry();
                const tailPos = new Float32Array(tailPoints * 3);
                tailGeo.setAttribute('position', new THREE.BufferAttribute(tailPos, 3));
                
                const tailMat = new THREE.LineBasicMaterial({ 
                    color: 0xff1493, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending 
                });
                const tail = new THREE.Line(tailGeo, tailMat);
                cometGroup.add(tail);

                cometGroup.userData = {
                    start: new THREE.Vector3(),
                    end: new THREE.Vector3(),
                    progress: 0,
                    speed: 0.01 + Math.random() * 0.02,
                    history: Array(tailPoints).fill(new THREE.Vector3()),
                    tailGeo: tailGeo
                };
                
                resetComet(cometGroup);
                universeGroup.add(cometGroup);
                comets.push(cometGroup);
            }
        }

        function resetComet(comet) {
            const startX = (Math.random() - 0.5) * 60; const startZ = (Math.random() - 0.5) * 60;
            comet.userData.start.set(startX, 20 + Math.random() * 10, startZ);
            comet.userData.end.set(startX + (Math.random() - 0.5) * 40, -10, startZ + (Math.random() - 0.5) * 40);
            comet.userData.progress = 0;
            comet.userData.history = Array(20).fill(comet.userData.start.clone());
        }

        function updateComets() {
            comets.forEach(comet => {
                const data = comet.userData;
                data.progress += data.speed;
                
                // Posició actual del cap
                const currentPos = new THREE.Vector3().lerpVectors(data.start, data.end, data.progress);
                comet.children[0].position.copy(currentPos); // Moure el cap
                
                // Actualitzar l'historial per a l'estela
                data.history.unshift(currentPos.clone());
                data.history.pop();
                
                // Dibuixar l'estela
                const posAttr = data.tailGeo.attributes.position;
                for(let i=0; i<20; i++) {
                    posAttr.setXYZ(i, data.history[i].x, data.history[i].y, data.history[i].z);
                }
                posAttr.needsUpdate = true;

                if(data.progress >= 1.0) resetComet(comet);
            });
        }

        // --- SISTEMA 1: EL COR MULTI-CAPA ---
        function crearCorUltraComplex() {
            universeGroup.add(mainHeartGroup);

            // 1. Forma Base del Cor
            const heartShape = new THREE.Shape();
            const x = 0, y = 0;
            heartShape.moveTo( x + 5, y + 5 );
            heartShape.bezierCurveTo( x + 5, y + 5, x + 4, y, x, y );
            heartShape.bezierCurveTo( x - 6, y, x - 6, y + 7, x - 6, y + 7 );
            heartShape.bezierCurveTo( x - 6, y + 11, x - 3, y + 15.4, x + 5, y + 19 );
            heartShape.bezierCurveTo( x + 12, y + 15.4, x + 16, y + 11, x + 16, y + 7 );
            heartShape.bezierCurveTo( x + 16, y + 7, x + 16, y, x + 10, y );
            heartShape.bezierCurveTo( x + 7, y, x + 5, y + 5, x + 5, y + 5 );

            const extrudeSettings = { depth: 3.5, bevelEnabled: true, bevelSegments: 16, steps: 8, bevelSize: 2.5, bevelThickness: 2.5 };
            const geometry = new THREE.ExtrudeGeometry( heartShape, extrudeSettings );
            geometry.computeBoundingBox(); geometry.translate( -5, -10, -1.75 );
            geometry.scale(0.025, 0.025, 0.025); geometry.rotateZ(Math.PI); 
            
            // Centrar-lo perfectament
            geometry.computeBoundingBox();
            const center = new THREE.Vector3();
            geometry.boundingBox.getCenter(center);
            geometry.translate(-center.x, -center.y, -center.z);

            // 2. Capa Exterior (Cristall Refractant Shaded)
            heartUniforms = { uTime: { value: 0.0 } };
            const outerMat = new THREE.ShaderMaterial({
                uniforms: heartUniforms,
                vertexShader: `
                    varying vec2 vUv; varying vec3 vNormal; varying vec3 vPosition; uniform float uTime;
                    void main() {
                        vUv = uv; vNormal = normalize(normalMatrix * normal);
                        vec3 pos = position;
                        float wave = sin(pos.x * 20.0 + uTime * 3.0) * 0.005 + cos(pos.y * 20.0 + uTime * 2.0) * 0.005;
                        pos += normal * wave; 
                        vPosition = (modelMatrix * vec4(pos, 1.0)).xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float uTime; 
                    varying vec2 vUv; varying vec3 vNormal; varying vec3 vPosition;
                    void main() {
                        vec3 color1 = vec3(1.0, 0.05, 0.4); // Rosa intens
                        vec3 color2 = vec3(0.5, 0.0, 1.0); // Púrpura
                        
                        float mixValue = sin(vPosition.y * 10.0 + uTime * 2.0) * 0.5 + 0.5;
                        vec3 color = mix(color1, color2, mixValue);
                        
                        // Càlcul de Fresnel per a efecte de cristall
                        vec3 viewDir = normalize(cameraPosition - vPosition);
                        float fresnel = clamp(1.0 - dot(viewDir, vNormal), 0.0, 1.0);
                        float fresnelPow = pow(fresnel, 2.5);
                        
                        // Brillantor per batec
                        float pulse = pow(abs(sin(uTime * 1.5)), 8.0) + pow(abs(sin(uTime * 1.5 + 0.4)), 8.0) * 0.5;
                        
                        color += vec3(1.0, 0.9, 0.9) * fresnelPow * 2.0; // Vora blanca
                        color += vec3(1.0, 0.3, 0.5) * pulse * 1.5; // Resplendor
                        
                        gl_FragColor = vec4(color, 0.7 + fresnelPow * 0.3); 
                    }
                `,
                transparent: true, side: THREE.DoubleSide, blending: THREE.AdditiveBlending
            });
            const outerMesh = new THREE.Mesh(geometry, outerMat);
            mainHeartGroup.add(outerMesh);

            // 3. Nucli Interior (Plasma Calent)
            const innerGeo = geometry.clone();
            innerGeo.scale(0.85, 0.85, 0.85); // Més petit, a l'interior
            innerCoreUniforms = { uTime: { value: 0 } };
            const innerMat = new THREE.ShaderMaterial({
                uniforms: innerCoreUniforms,
                vertexShader: `varying vec3 vPos; void main() { vPos=position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform float uTime; varying vec3 vPos;
                    void main() {
                        float pulse = sin(vPos.y * 30.0 - uTime * 10.0) * 0.5 + 0.5;
                        vec3 coreColor = mix(vec3(1.0, 0.8, 0.0), vec3(1.0, 0.0, 0.0), pulse); // Or a Vermell
                        gl_FragColor = vec4(coreColor, 1.0);
                    }
                `,
            });
            const innerMesh = new THREE.Mesh(innerGeo, innerMat);
            mainHeartGroup.add(innerMesh);

            // 4. Jaula de Filferro (Malla d'Energia)
            const wireGeo = geometry.clone();
            wireGeo.scale(1.05, 1.05, 1.05);
            wireframeUniforms = { uTime: { value: 0 } };
            const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending });
            const wireMesh = new THREE.Mesh(wireGeo, wireMat);
            mainHeartGroup.add(wireMesh);
        }

                };

        function actualitzarBoids(delta, time) {
            const targetPos = mainHeartGroup.position.clone(); 
            
            for (let i = 0; i < boids.length; i++) {
                const boid = boids[i];
                const data = boid.userData;
                
                let sep = new THREE.Vector3();
                let ali = new THREE.Vector3();
                let coh = new THREE.Vector3();
                let count = 0;
                
                for (let j = 0; j < boids.length; j++) {
                    if (i === j) continue;
                    const other = boids[j];
                    const dist = boid.position.distanceTo(other.position);
                    
                    if (dist > 0 && dist < 1.0) { 
                        const diff = boid.position.clone().sub(other.position).normalize().divideScalar(dist);
                        sep.add(diff);
                        ali.add(other.userData.velocity);
                        coh.add(other.position);
                        count++;
                    }
                }
                
                if (count > 0) {
                    sep.divideScalar(count).normalize().multiplyScalar(data.maxSpeed).sub(data.velocity).clampLength(0, data.maxForce);
                    ali.divideScalar(count).normalize().multiplyScalar(data.maxSpeed).sub(data.velocity).clampLength(0, data.maxForce);
                    coh.divideScalar(count).sub(boid.position).normalize().multiplyScalar(data.maxSpeed).sub(data.velocity).clampLength(0, data.maxForce);
                }
                
                const attractor = targetPos.clone().sub(boid.position);
                const distToTarget = attractor.length();
                attractor.normalize().multiplyScalar(data.maxSpeed).sub(data.velocity).clampLength(0, data.maxForce * 1.5);
                
                const vortex = new THREE.Vector3(boid.position.z - targetPos.z, 0, -(boid.position.x - targetPos.x)).normalize().multiplyScalar(data.maxForce * 2.0);
                
                sep.multiplyScalar(2.0);
                ali.multiplyScalar(1.0);
                coh.multiplyScalar(1.0);
                attractor.multiplyScalar(0.5);
                
                data.acceleration.add(sep).add(ali).add(coh).add(attractor).add(vortex);
                
                if(boid.position.y < -1.0) data.acceleration.y += 0.01;
                if(distToTarget > 15) data.acceleration.add(targetPos.clone().sub(boid.position).normalize().multiplyScalar(0.01));

                data.velocity.add(data.acceleration);
                data.velocity.clampLength(0, data.maxSpeed);
                boid.position.add(data.velocity);
                data.acceleration.set(0,0,0); 
                
                if(data.velocity.lengthSq() > 0.0001) {
                    const lookTarget = boid.position.clone().add(data.velocity);
                    boid.lookAt(lookTarget);
                }
                
                data.wingPhase += data.wingSpeed * delta;
                const flap = Math.sin(data.wingPhase);
                data.wings[0].rotation.z = flap;
                data.wings[1].rotation.z = -flap;
            }
        }

        // --- SISTEMA 5: CONSTEL·LACIONS DEL DESTÍ ---
        function crearConstel·lacionsDesti() {
            const lineMaterial = new THREE.LineBasicMaterial({ 
                color: 0xffffff, transparent: true, opacity: 0.3, linewidth: 2, blending: THREE.AdditiveBlending 
            });
            const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
            const starGeo = new THREE.SphereGeometry(0.1, 8, 8);

            function dibuixarForma(puntsMathFunc, numPunts, radi, offsetX, offsetY, offsetZ) {
                const punts = [];
                const estels = new THREE.Group();
                for(let i=0; i<numPunts; i++) {
                    const t = i / (numPunts - 1);
                    const coord = puntsMathFunc(t);
                    coord.multiplyScalar(radi);
                    coord.set(coord.x + offsetX, coord.y + offsetY, coord.z + offsetZ);
                    punts.push(coord);
                    
                    const estrella = new THREE.Mesh(starGeo, starMaterial);
                    estrella.position.copy(coord);
                    const glowGeo = new THREE.SphereGeometry(0.3, 8, 8);
                    const glowMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending });
                    estrella.add(new THREE.Mesh(glowGeo, glowMat));
                    
                    estels.add(estrella);
                }
                
                const liniaGeo = new THREE.BufferGeometry().setFromPoints(punts);
                const linia = new THREE.Line(liniaGeo, lineMaterial);
                
                const grupTotal = new THREE.Group();
                grupTotal.add(linia, estels);
                universeGroup.add(grupTotal);
                constellationLines.push({ group: grupTotal, phase: Math.random()*Math.PI*2 });
            }

            dibuixarForma((t) => {
                const angle = t * Math.PI * 2;
                const x = (Math.cos(angle)) / (1 + Math.sin(angle)*Math.sin(angle));
                const y = (Math.cos(angle) * Math.sin(angle)) / (1 + Math.sin(angle)*Math.sin(angle));
                return new THREE.Vector3(x, y, 0);
            }, 50, 15, -20, 25, -40);

            dibuixarForma((t) => {
                const angle = t * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = 13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle);
                return new THREE.Vector3(x/16, y/16, 0); 
            }, 60, 20, 25, 20, -50);
            
            dibuixarForma((t) => {
                const angle = t * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(angle), 3);
                const y = 13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle);
                return new THREE.Vector3(x/16, y/16, 0); 
            }, 60, 15, 15, 22, -45);
        }

        // --- FUNCIONS ESTRUCTURALS EXISTENTS MILLORADES ---
        
        function crearSòlMandalaLoto() {
            const floorGeo = new THREE.PlaneGeometry(50, 50, 64, 64);
            lotusUniforms = { uTime: { value: 0.0 } };
            
            const floorMat = new THREE.ShaderMaterial({
                uniforms: lotusUniforms,
                vertexShader: `
                    varying vec2 vUv; uniform float uTime;
                    void main() { 
                        vUv = uv; 
                        vec3 pos = position;
                        float dist = distance(uv, vec2(0.5));
                        pos.z += sin(dist * 50.0 - uTime * 5.0) * 0.05 * smoothstep(0.5, 0.0, dist);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0); 
                    }
                `,
                fragmentShader: `
                    uniform float uTime; varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv * 2.0 - 1.0;
                        float r = length(uv);
                        float a = atan(uv.y, uv.x);
                        
                        float f = cos(a * 16.0);
                        float pulse = sin(uTime * 2.0) * 0.02 + 0.98;
                        float shape = smoothstep(0.5 * pulse, 0.51 * pulse, r + f * 0.05) - smoothstep(0.51 * pulse, 0.54 * pulse, r + f * 0.05);
                        
                        float ring1 = smoothstep(0.2, 0.21, r) - smoothstep(0.21, 0.22, r);
                        float ring2 = smoothstep(0.4, 0.41, r) - smoothstep(0.41, 0.42, r);
                        float geom = ring1 + ring2;
                        
                        float ripple = sin(r * 60.0 - uTime * 6.0) * 0.5 + 0.5;
                        
                        vec3 colorLotus = vec3(1.0, 0.1, 0.5); 
                        vec3 colorGeom = vec3(0.0, 1.0, 1.0); 
                        vec3 colorBase = vec3(0.02, 0.0, 0.1); 
                        
                        vec3 color = colorBase;
                        color += colorLotus * shape * 3.0;
                        color += colorGeom * geom * 2.0;
                        color += vec3(1.0, 0.8, 0.0) * ripple * geom * 4.0; 
                        
                        float fade = smoothstep(1.0, 0.6, r);
                        float alpha = clamp((shape + geom + ripple*0.1) * fade, 0.0, 1.0);
                        
                        gl_FragColor = vec4(color, alpha * 0.8);
                    }
                `,
                transparent: true, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false
            });
            
            lotusMandalaFloor = new THREE.Mesh(floorGeo, floorMat);
            lotusMandalaFloor.rotation.x = -Math.PI / 2;
            lotusMandalaFloor.position.y = -1.5; 
            universeGroup.add(lotusMandalaFloor);
        }

        function crearVoltaNebulosa() {
            const domeGeo = new THREE.SphereGeometry(80, 64, 64); 
            domeGeo.scale(-1, 1, 1); 
            
            nebulaUniforms = { uTime: { value: 0 } };
            const domeMat = new THREE.ShaderMaterial({
                uniforms: nebulaUniforms,
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform float uTime; varying vec2 vUv;
                    
                    float random(vec2 p) { return fract(sin(dot(p, vec2(12.9898,78.233))) * 43758.5453123); }
                    float noise(vec2 p) {
                        vec2 i = floor(p); vec2 f = fract(p);
                        float a = random(i); float b = random(i + vec2(1.0, 0.0));
                        float c = random(i + vec2(0.0, 1.0)); float d = random(i + vec2(1.0, 1.0));
                        vec2 u = f * f * (3.0 - 2.0 * f);
                        return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
                    }
                    float fbm(vec2 p) {
                        float value = 0.0; float amp = 0.5;
                        for(int i=0; i<5; i++) { value += amp * noise(p); p *= 2.0; amp *= 0.5; }
                        return value;
                    }
                    
                    void main() {
                        vec2 uv = vUv * 4.0;
                        float n = fbm(uv + vec2(uTime*0.02, uTime*0.01));
                        float n2 = fbm(uv*2.0 - vec2(uTime*0.03, 0.0));
                        
                        float nebula = (n + n2*0.5) * 0.8;
                        
                        vec3 bg = vec3(0.01, 0.0, 0.05); 
                        vec3 col1 = vec3(0.6, 0.0, 0.8); 
                        vec3 col2 = vec3(1.0, 0.2, 0.5); 
                        vec3 col3 = vec3(0.0, 0.8, 1.0); 
                        
                        vec3 color = bg;
                        color = mix(color, col1, smoothstep(0.2, 0.8, nebula));
                        color = mix(color, col2, smoothstep(0.4, 1.0, nebula));
                        color = mix(color, col3, smoothstep(0.6, 1.2, nebula));
                        
                        float star = random(vUv * 500.0);
                        if(star > 0.998) color += vec3(1.0);
                        
                        float alpha = clamp(nebula * 0.6 + 0.2, 0.0, 0.9);
                        gl_FragColor = vec4(color, alpha);
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false
            });
            nebulaDome = new THREE.Mesh(domeGeo, domeMat); 
            universeGroup.add(nebulaDome);
        }

        function crearPilarsDeLlum() {
            const pillarsGroup = new THREE.Group();
            const pillarGeo = new THREE.CylinderGeometry(0.5, 1.2, 30, 32, 1, true);
            pillarGeo.translate(0, 15, 0); 

            const pillarMat = new THREE.ShaderMaterial({
                uniforms: { uTime: { value: 0 } },
                vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                fragmentShader: `
                    uniform float uTime; varying vec2 vUv;
                    void main() {
                        float alpha = pow(1.0 - vUv.y, 2.0); 
                        float pulse = sin(vUv.y * 15.0 - uTime * 3.0) * 0.5 + 0.5;
                        float ray = sin(vUv.x * 30.0 + uTime) * 0.5 + 0.5; 
                        
                        vec3 color = mix(vec3(1.0, 0.2, 0.8), vec3(0.0, 0.8, 1.0), pulse * ray);
                        gl_FragColor = vec4(color, alpha * (pulse * 0.5 + 0.5) * 0.4); 
                    }
                `,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide
            });

            for(let i = 0; i < 12; i++) {
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                const angle = (i / 12) * Math.PI * 2;
                const radius = 9; 
                pillar.position.set(Math.cos(angle) * radius, -2, Math.sin(angle) * radius);
                pillarsGroup.add(pillar);

            universeGroup.add(pillarsGroup);
        }

        // 5. LÒGICA D'INTERACCIÓ I COL·LISIONS

        function triggerPortalCrossing(currentCamPos) {
            if (hasCrossedPortal) return; 
            hasCrossedPortal = true;
            isFlashing = true; 
            
            universeGroup.visible = true;
            userCenter.copy(currentCamPos);
            universeGroup.position.copy(userCenter);

            if(flashSphere && shockwaveRing && shockwaveDisk) {
                flashSphere.position.copy(currentCamPos); flashSphere.scale.setScalar(1); flashSphere.material.opacity = 1; flashSphere.visible = true;
                shockwaveRing.position.copy(currentCamPos); shockwaveRing.scale.setScalar(1); shockwaveRing.material.opacity = 1; shockwaveRing.visible = true;
                shockwaveDisk.position.copy(currentCamPos); shockwaveDisk.scale.setScalar(1); shockwaveDisk.material.opacity = 0.8; shockwaveDisk.visible = true;
            }

            portalGroup.visible = false; pathGroup.visible = false;
            document.getElementById('instruction-layer').style.opacity = '0';
            setTimeout(()=> document.getElementById('instruction-layer').style.display = 'none', 2000);
        }

        function setupInteraction() {
            const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
            
            function onTouch(event) {
                if(!isStarted) return;
                
                if(!hasCrossedPortal) {
                    if (renderer.xr.isPresenting) {
                        const tempCamPos = new THREE.Vector3(); camera.getWorldPosition(tempCamPos); triggerPortalCrossing(tempCamPos);
                    } else { isAutoWalking = true; }
                    return;
                }
                
                let clientX = event.clientX || (event.touches ? event.touches[0].clientX : 0);
                let clientY = event.clientY || (event.touches ? event.touches[0].clientY : 0);
                mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = -(clientY / window.innerHeight) * 2 + 1;
                
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects([lotusMandalaFloor, mainHeartGroup.children[0]]);
                
                // Explosiò d'estrelles interactive en qualsevol lloc
                crearMicroEstrellasTouch(raycaster.ray.origin, raycaster.ray.direction);

                if (intersects.length > 0) {
                    const hit = intersects[0];
                    if(hit.object.parent === mainHeartGroup) {
                        crearExplosioAmor(mainHeartGroup.position);
                        boids.forEach(b => {
                            b.userData.velocity.add(b.position.clone().sub(mainHeartGroup.position).normalize().multiplyScalar(0.2));
                        });
                    } else {
                        crearOnaAigua(hit.point);
                    }
                }
            }
            window.addEventListener('click', onTouch); window.addEventListener('touchstart', onTouch);
        }

        function crearMicroEstrellasTouch(origin, dir) {
            // Un efecte màgic addicional on toquis
            const distance = 2.0; 
            const pos = origin.clone().add(dir.multiplyScalar(distance));
            
            const starGeo = new THREE.SphereGeometry(0.02, 8, 8);
            const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, blending: THREE.AdditiveBlending });
            
            for(let i=0; i<15; i++) {
                const s = new THREE.Mesh(starGeo, starMat);
                s.position.copy(pos);
                s.userData = {
                    vel: new THREE.Vector3((Math.random()-0.5)*0.05, (Math.random()-0.5)*0.05, (Math.random()-0.5)*0.05)
                };
                universeGroup.add(s);
                
                let life = 1.0;
                function animStar() {
                    life -= 0.02;
                    s.position.add(s.userData.vel);
                    s.material.opacity = life;
                    if(life > 0) requestAnimationFrame(animStar);
                    else { universeGroup.remove(s); s.geometry.dispose(); s.material.dispose(); }
                }
                animStar();
            }
        }

        function crearExplosioAmor(posicio) {
            const ring = new THREE.Mesh(new THREE.IcosahedronGeometry(0.5, 2), new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, blending: THREE.AdditiveBlending }));
            ring.position.copy(posicio); universeGroup.add(ring);
            
            let scale = 1;
            function anim() {
                scale += 0.3; ring.scale.set(scale, scale, scale); ring.material.opacity -= 0.04;
                ring.rotation.y += 0.1; ring.rotation.x += 0.1;
                if (ring.material.opacity > 0) requestAnimationFrame(anim); else { universeGroup.remove(ring); ring.geometry.dispose(); ring.material.dispose(); }
            }
            anim();
        }

        function crearOnaAigua(posicioLocal) {

        function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }

        // ============================================================================
        // 6. BUCLE D'ANIMACIÓ PRINCIPAL I ACTUALITZACIÓ DE SISTEMES
        // ============================================================================
        function render() {
            if(!isStarted) { renderer.render(scene, camera); return; }

            const elapsedTime = clock.getElapsedTime();
            const delta = clock.getDelta(); 
            const camPos = new THREE.Vector3();
            camera.getWorldPosition(camPos);

            // --- FASE 1: PRE-PORTAL ---
            if (!hasCrossedPortal) {
                portalUniforms.uTime.value = elapsedTime;
                portalGroup.rotation.y = Math.sin(elapsedTime * 0.5) * 0.1; 

                if (isAutoWalking && !renderer.xr.isPresenting) {
                    camera.position.z -= delta * 5.0; 
                    camera.getWorldPosition(camPos); 
                }
                
                if (camPos.distanceTo(portalGroup.position) < 1.8 || camPos.z <= portalGroup.position.z + 0.5) {
                    triggerPortalCrossing(camPos);
                }
            } 
            // --- FASE 2: EL SANTUARI ---
            else {
                universeGroup.scale.lerp(new THREE.Vector3(1, 1, 1), 0.08);

                userCenter.lerp(camPos, 0.01); 

                lotusUniforms.uTime.value = elapsedTime;
                if (nebulaDome) {
                    nebulaUniforms.uTime.value = elapsedTime;
                    nebulaDome.rotation.y += 0.0003; 
                    nebulaDome.rotation.x = Math.sin(elapsedTime * 0.1) * 0.05;
                }

                // --- CINEMÀTICA DEL COR PRINCIPAL ---
                const forwardVec = new THREE.Vector3(0, 0, -2.5);
                forwardVec.applyQuaternion(camera.quaternion); 
                
                const targetPosGlobal = camPos.clone().add(forwardVec);
                const targetPosLocal = universeGroup.worldToLocal(targetPosGlobal);
                
                mainHeartGroup.position.lerp(targetPosLocal, 0.03);
                const localCamPos = universeGroup.worldToLocal(camPos.clone());
                mainHeartGroup.lookAt(localCamPos); 

                // --- SHADERS DEL COR I ALES ---
                heartUniforms.uTime.value = elapsedTime;
                innerCoreUniforms.uTime.value = elapsedTime;
                wireframeUniforms.uTime.value = elapsedTime;
                
                const tHeart = elapsedTime * 1.5;
                const beat1 = Math.pow(Math.sin(tHeart), 12.0);
                const beat2 = Math.pow(Math.sin(tHeart + 0.35), 12.0) * 0.4; 
                const scaleOffset = 1.0 + (beat1 + beat2) * 0.18;
                
                mainHeartGroup.scale.set(scaleOffset, scaleOffset, scaleOffset);
                mainHeartGroup.children[1].scale.setScalar(0.85 + beat1 * 0.1);
                mainHeartGroup.children[2].rotation.y += 0.01;
                mainHeartGroup.children[2].rotation.z += 0.005;

                // Animació d'Halos de Geometria Sagrada
                if (sacredHalosGroup) {
                    sacredHalosGroup.children[0].rotation.z -= 0.002;
                    sacredHalosGroup.children[1].rotation.z += 0.003;
                    sacredHalosGroup.children[2].rotation.z -= 0.001;
                    
                    const haloPulse = 1.0 + beat1 * 0.1;
                    sacredHalosGroup.scale.set(haloPulse, haloPulse, haloPulse);
                }

                // Animació Loto de Cristall
                if (crystalLotusGroup) {
                    crystalLotusGroup.rotation.y += 0.005;
                    crystalLotusGroup.children.forEach(petal => {
                        petal.material.uniforms.uTime.value = elapsedTime;
                        petal.rotation.x = Math.PI/4 + Math.sin(elapsedTime * 2.0 + petal.userData.phase) * 0.1;
                    });
                }

                if (wingL && wingR) {
                    const flap = Math.sin(elapsedTime * 2.0) * 0.5 + beat1 * 0.3;
                    wingL.rotation.y = flap + 0.2;
                    wingR.rotation.y = -flap - 0.2;
                    wingL.rotation.z = Math.sin(elapsedTime) * 0.1;
                    wingR.rotation.z = -Math.sin(elapsedTime) * 0.1;
                }
                
                if (goldenRingsGroup) {
                    goldenRingsGroup.rotation.y += 0.015; 
                    goldenRingsGroup.rotation.z += 0.008;
                    goldenRingsGroup.children[0].rotation.x += 0.01; 
                    goldenRingsGroup.children[1].rotation.y -= 0.012;
                    goldenRingsGroup.children[2].rotation.z += 0.015;
                }

                // --- ACTUALITZACIÓ DEL FIL VERMELL DEL DESTÍ ---
                if (redThreadLine) {
                    const chestPosLocal = new THREE.Vector3(0, -0.4, -0.2);
                    chestPosLocal.applyQuaternion(camera.quaternion);
                    chestPosLocal.add(localCamPos); 
                    
                    const endLocal = mainHeartGroup.position.clone();
                    const dist = chestPosLocal.distanceTo(endLocal);
                    
                    const midLocal = chestPosLocal.clone().lerp(endLocal, 0.5);
                    midLocal.y -= dist * 0.4; 
                    midLocal.x += Math.sin(elapsedTime) * dist * 0.2; 
                    
                    redThreadCurve.v0.copy(chestPosLocal);
                    redThreadCurve.v1.copy(midLocal);
                    redThreadCurve.v2.copy(endLocal);
                    
                    const pts = redThreadCurve.getPoints(99);
                    const posAttr = redThreadLine.geometry.attributes.position;
                    for(let i=0; i<100; i++) {
                        posAttr.setXYZ(i, pts[i].x, pts[i].y, pts[i].z);
                    }
                    posAttr.needsUpdate = true;

                    const tPulse = (elapsedTime * 0.5) % 1.0;
                    threadPulse.position.copy(redThreadCurve.getPoint(tPulse));
                    const pulseScale = 1.0 + Math.sin(elapsedTime * 20.0) * 0.5;
                    threadPulse.scale.set(pulseScale, pulseScale, pulseScale);
                }

                // --- BOIDS I ROSES ---
                actualitzarBoids(delta, elapsedTime);

                parametricRoses.forEach(rose => {
                    const data = rose.userData;
                    if(elapsedTime > data.delay) { 
                        data.currentScale += (data.targetScale - data.currentScale) * data.growthSpeed;
                        rose.scale.setScalar(data.currentScale);
                        rose.rotation.z = Math.sin(elapsedTime * 2.0 + data.delay) * 0.05;
                    }
                });

                constellationLines.forEach(c => {
                    c.phase += delta;
                    c.group.children[1].children.forEach((star, index) => {
                        const starPulse = Math.sin(c.phase * 3.0 + index) * 0.5 + 0.5;
                        star.scale.setScalar(0.5 + starPulse);
                        if(star.children[0]) {
                            star.children[0].material.opacity = starPulse * 0.4;
                        }
                    });
                    c.group.rotation.y = Math.sin(c.phase * 0.1) * 0.1;
                });

                // --- ACTUALITZACIÓ COMETES AMB ESTELA ---
                updateComets();

                // --- ACTUALITZACIÓ DIAMANTS FLOTANTS ---
                floatingDiamonds.forEach(diamond => {
                    const d = diamond.userData;
                    d.angle += d.speed * delta;
                    d.yOffset += Math.sin(elapsedTime * d.speed) * 0.02;
                    diamond.position.set(
                        userCenter.x + Math.cos(d.angle) * d.radius,
                        userCenter.y + d.yOffset,
                        userCenter.z + Math.sin(d.angle) * d.radius
                    );
                    diamond.rotation.x += d.spinX;
                    diamond.rotation.y += d.spinY;
                });

                // --- ELEMENTS EN ÒRBITA LENTA ---
                lanterns.forEach((lantern) => {
                    const data = lantern.userData; 
                    data.yOffset += data.speed; 
                    
                    lantern.position.x = Math.cos(data.angle) * data.radius + Math.sin(elapsedTime * data.swaySpeed + data.swayOffset) * 0.8;
                    lantern.position.z = Math.sin(data.angle) * data.radius + Math.cos(elapsedTime * data.swaySpeed + data.swayOffset) * 0.8;
                    lantern.position.y = data.yOffset;
                    
                    if(data.yOffset > 25) { 
                        data.yOffset = -5; 
                        data.angle = Math.random() * Math.PI * 2; 
                        data.radius = 3.0 + Math.random() * 15; 
                    }
                    
                    lantern.rotation.z = Math.sin(elapsedTime * data.swaySpeed + data.swayOffset) * 0.15;
                    lantern.rotation.x = Math.cos(elapsedTime * data.swaySpeed + data.swayOffset) * 0.15;
                    
                    if(lantern.children[1]) {
                        lantern.children[1].scale.setScalar(1.0 + Math.sin(elapsedTime * 5.0 + data.swayOffset) * 0.2);
                    }
                });

                // Textos rotatius súper lents i romàntics
                floatingTexts.forEach((sprite) => {
                    const data = sprite.userData; 
                    data.angle += 0.001 * data.speed; 
                    
                    sprite.position.x = Math.cos(data.angle) * data.radius; 
                    sprite.position.z = Math.sin(data.angle) * data.radius;
                    sprite.position.y = data.yOffset + Math.sin(elapsedTime * 1.5 + data.angle) * 0.5;
                    
                    // Efecte d'aparició i desaparició (Fade in/out) basat en la posició
                    const viewDot = localCamPos.clone().sub(sprite.position).normalize().dot(localCamPos.clone().normalize());
                    sprite.material.opacity = smoothstep(-0.5, 0.5, viewDot);

                    sprite.lookAt(localCamPos);
                });
                
                // Funció de suport matemàtic per al shader
                function smoothstep(edge0, edge1, x) {
                    const t = Math.max(0, Math.min(1, (x - edge0) / (edge1 - edge0)));
                    return t * t * (3 - 2 * t);
                }

                fireflies.forEach((fly) => {
                    const data = fly.userData; 
                    data.angle += 0.01 * data.speed;
                    const cx = localCamPos.x; const cz = localCamPos.z;
                    fly.position.x = cx + Math.cos(data.angle) * data.radius; 
                    fly.position.z = cz + Math.sin(data.angle) * data.radius;
                    fly.position.y = localCamPos.y + data.yOffset + Math.sin(elapsedTime * 3.0 + data.phase) * 0.5;
                });

                particleSystem.rotation.y = elapsedTime * 0.02; 

                // --- TORNAT DE PÈTALS ---
                petals.forEach(petal => {
                    const data = petal.userData;
                    data.angle += data.rotSpeed; 
                    data.height += data.riseSpeed; 
                    
                    const currentRadius = data.baseRadius + data.radiusOffset * Math.sin(data.height * 0.2);
                    
                    petal.position.x = localCamPos.x + Math.cos(data.angle) * currentRadius;
                    petal.position.z = localCamPos.z + Math.sin(data.angle) * currentRadius;
                    petal.position.y = data.height;
                    
                    petal.rotation.x += data.tumbleX; 
                    petal.rotation.y += data.tumbleY;
                    
                    if (data.height > 12) { 
                        data.height = -2; 
                        data.baseRadius = 1.0 + Math.random() * 4.0; 
                    } 
                });
            }

            // --- ANIMACIÓ CRÍTICA: ONA DE XOC MASSIVA ---
            if (isFlashing) {
                if(flashSphere) { 
                    flashSphere.scale.addScalar(1.2); 
                    flashSphere.material.opacity -= 0.018; 
                }
                if(shockwaveRing) { 
                    shockwaveRing.scale.addScalar(1.8); 
                    shockwaveRing.material.opacity -= 0.015; 
                }
                if(shockwaveDisk) {
                    shockwaveDisk.scale.addScalar(2.5);
                    shockwaveDisk.material.opacity -= 0.02;
                }
                
                if (flashSphere && flashSphere.material.opacity <= 0) { 
                    isFlashing = false; 
                    flashSphere.visible = false; 
                    shockwaveRing.visible = false; 
                    shockwaveDisk.visible = false;
                }
            }

            renderer.render(scene, camera);
        }

        init();
        renderer.setAnimationLoop(render);

    </script>
</body>
</html>
